                        </div>
                    </div>
                `;
            }

            static renderAssunto(a) {
                const tops = DataManager.getTopLevelTopicos(a.id); // Apenas tópicos raiz
                const virtualTopic = DataManager.getTopicosByAssunto(a.id).find(t => t.isVirtual);
                const isSingleConcept = a.isSingleConcept && virtualTopic;

                // Para progresso, considerar TODOS os tópicos (incluindo subtópicos)
                const allTopicos = DataManager.getTopicosByAssunto(a.id).filter(t => !t.isVirtual);
                const aTotal = allTopicos.length;
                const aDone = allTopicos.filter(t => t.cicloAtual >= 1).length;
                const aProg = aTotal ? (aDone / aTotal) * 100 : 0;

                // Se é conceito único, calcular progresso do tópico virtual
                const singleProg = virtualTopic ? (virtualTopic.cicloAtual >= 1 ? 100 : 0) : 0;
                const displayProg = isSingleConcept ? singleProg : aProg;

                const isOpen = this.expandedState.has(a.id);

                // Badge de incidência para Conceito Único
                let badgesHtml = '';
                if (isSingleConcept && virtualTopic) {
                    let val = virtualTopic.incidencia;
                    let inc = 5;

                    if (typeof val === 'string' && isNaN(parseInt(val))) {
                        const map = { 'muito_frequente': 9, 'frequente': 7, 'normal': 5, 'pouco_frequente': 2 };
                        inc = map[val] || 5;
                    } else {
                        inc = parseInt(val) || 5;
                    }

                    let color = '#94a3b8';
                    let icon = '';
                    if (inc >= 8) { color = 'var(--danger)'; icon = '🔥'; }
                    else if (inc >= 6) { color = 'var(--warning)'; }
                    else if (inc >= 4) { color = 'var(--info)'; }

                    if (inc !== 5 || icon) {
                        badgesHtml = `<span class="badge" style="background:${color}; color:white; font-size:0.7rem; margin-left:8px" title="Incidência: ${inc}/10">${icon} ${inc}</span>`;
                    }
                }

                return `
                    <div class="margin-bottom: 10px; background: var(--bg-light); border: 1px solid var(--border); border-left: 3px solid ${isSingleConcept ? 'var(--primary)' : 'var(--secondary)'}; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1)">
                        <div class="accordion-header" onclick="${isSingleConcept ? '' : `DisciplinesView.toggle('${a.id}')`}" style="padding: 10px; cursor: ${isSingleConcept ? 'default' : 'pointer'}; display: flex; justify-content: space-between; align-items: center">

                            <div style="display: flex; align-items: center; gap: 10px">

                                    <div class="progress-fill" style="width: ${displayProg}%; background: var(--success)"></div>
                                </div>
                                ${isSingleConcept ? `
                                    <span style="font-size: 0.8rem; color: var(--text-muted);">${virtualTopic.cicloAtual}x estudado</span>

                                    <button onclick="event.stopPropagation(); DisciplinesView.marcarProgressoAssunto('${a.id}', 1)" class="btn btn-sm" style="padding: 2px 8px; font-size: 0.8rem; background: var(--success); color: white" title="Aumentar progresso">+</button>
                                ` : `
                                    <button onclick="event.stopPropagation(); DisciplinesView.addTopicForm('${a.id}')" class="btn btn-sm btn-outline" style="font-size: 0.7rem">+ Tópico</button>
                                `}
                                <span onclick="event.stopPropagation(); DisciplinesView.editAssunto('${a.id}')" style="cursor: pointer; opacity: 0.5">✏️</span>
                                <span onclick="event.stopPropagation(); DisciplinesView.deleteAssunto('${a.id}')" style="cursor: pointer; opacity: 0.5">🗑️</span>
                            </div>
                        </div>

                        ${!isSingleConcept ? `
                            <div id="body-${a.id}" class="accordion-body ${isOpen ? '' : 'hidden'}" style="padding: 10px; border-top: 1px dashed var(--border)">

                                ${tops.length ? tops.map(t => this.renderTopico(t)).join('') : '<small class="text-muted">Sem tópicos</small>'}

                        ` : ''}

            static renderTopico(t, nivel = 0) {
                const subtopicos = DataManager.getSubtopicos(t.id);
                const hasChildren = subtopicos.length > 0;
                const prog = hasChildren ?
                    DataManager.calcularProgressoComSubtopicos(t.id) :
                    (t.cicloAtual >= 1 ? 100 : 0);

                const indent = nivel * 20; // Indentação em px
                const bgColor = nivel > 0 ? 'var(--bg)' : 'transparent';

                // Badge de incidência (Numérico 1-10)
                let incidenciaValor = t.incidencia;
                // Migração visual on-the-fly
                if (typeof incidenciaValor === 'string') {
                    const map = { 'muito_frequente': 9, 'frequente': 7, 'normal': 5, 'pouco_frequente': 2 };
                    incidenciaValor = map[incidenciaValor] || 5;
                }
                incidenciaValor = parseInt(incidenciaValor) || 5;

                let badgeColor = '#94a3b8'; // Default (Low)

                if (incidenciaValor >= 8) {
                    badgeColor = 'var(--danger)'; // Hot

                    badgeColor = 'var(--warning)'; // Warm
                } else if (incidenciaValor >= 4) {

                        ${subtopicos.map(sub => this.renderTopico(sub, nivel + 1)).join('')}

                `;
            }

            static addForm() {

                UI.showModal(`

            static saveAssunto(disciplinaId, id = '') {
                const nome = document.getElementById('aNome').value;
                const isSingleConcept = document.getElementById('aSingleConcept')?.checked || false;
                const incidencia = parseInt(document.getElementById('aIncidencia')?.value) || 5;

                if (nome) {
                    if (id) {
                        const a = DataManager.getAssunto(id);
                        if (a) {
                            const oldStatus = a.isSingleConcept;
                            a.nome = nome;
                            a.isSingleConcept = isSingleConcept;
                            DataManager.updateAssunto(a);

                            if (isSingleConcept) {
                                let vTopic = DataManager.getTopicosByAssunto(id).find(t => t.isVirtual);
                                if (!vTopic) {
                                    this.createVirtualTopic(id, incidencia);
                                } else if (vTopic) {
                                    vTopic.incidencia = incidencia;
                                    DataManager.updateTopico(vTopic);
                                }
                            } else if (oldStatus && !isSingleConcept) {
                                this.removeVirtualTopic(id);
                            }
                        }
                    } else {
                        const newAssunto = DataManager.addAssunto({ nome, disciplinaId, isSingleConcept });
                        if (isSingleConcept) {
                            this.createVirtualTopic(newAssunto.id, incidencia);
                        }
                    }
                    UI.closeModal();
                    App.navigate('disciplines');
                }
            }

                const existing = DataManager.getTopicosByAssunto(assuntoId).find(t => t.isVirtual);
                if (!existing) {
                    DataManager.addTopico({
                        nome: 'Geral',
                        assuntoId,
                        tamanho: 'M',
                        isVirtual: true,
                        cicloAtual: 0,
                        status: 'nao-iniciado',
                        incidencia: incidencia
                    });
                }

                const virtualTopic = DataManager.getTopicosByAssunto(assuntoId).find(t => t.isVirtual);

                }

                }
            }

        class ErrorNotebook {

            static render() {
                const errors = DataManager.getErros();
                const topicos = DataManager.getTopicos();

                return `
                    < div style = "display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px" >
                        <h1>📕 Caderno de Erros</h1>
                        <div style="display: flex; gap: 10px">
                            <button onclick="ErrorNotebook.startReview()" class="btn btn-secondary">🔄 Revisar (${errors.length})</button>
                            <button onclick="ErrorNotebook.addForm()" class="btn btn-primary">+ Novo Erro</button>
                        </div>
                    </div >

                    ${errors.length === 0 ? '<div class="alert alert-info">Nenhum erro registrado. Parabéns ou comece a registrar!</div>' : ''}

                <div class="grid grid-2">
                    ${errors.map(erro => {
                    const t = DataManager.getTopico(erro.topicoId) || { nome: '?' };
                    const cat = erro.categoria || 'NaoEspecificado';
                    const catColors = { 'Atencao': 'var(--warning)', 'NaoEstudei': 'var(--info)', 'Pegadinha': '#f093fb', 'Memoria': 'var(--danger)', 'NaoEspecificado': '#ccc' };
                    const catLabel = { 'Atencao': 'Falta de Atenção', 'NaoEstudei': 'Não Estudei', 'Pegadinha': 'Pegadinha', 'Memoria': 'Falha na Memória', 'NaoEspecificado': 'Geral' };

                    return `
                                <div class="card" style="border-left: 4px solid var(--danger); position: relative">
                                    <div style="display: flex; justify-content: space-between">
                                        <small style="color: var(--text-muted)">${new Date(erro.data).toLocaleDateString()}</small>
                                        <span class="badge" style="background: ${catColors[cat]}; color: white; font-size: 0.7rem; position: absolute; top: 10px; right: 40px">${catLabel[cat] || cat}</span>
                                        <button onclick="ErrorNotebook.remove('${erro.id}')" style="background:none;border:none;cursor:pointer">🗑️</button>
                                    </div>
                                    <h4 style="margin: 5px 0">${t.nome}</h4>
                                    <p style="white-space: pre-wrap; font-size: 0.9rem">${erro.texto}</p>
                                    ${erro.comentario ? `<div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-style: italic; color: var(--text-muted)">"${erro.comentario}"</div>` : ''}
                                </div>
                            `;
                }).join('')}
                </div>
                `;
            }

            static addForm(preselectedTopicId = null) {
                const isQuickAdd = preselectedTopicId !== null;

                if (isQuickAdd) {
                    // MODO RÁPIDO: Contexto já definido
                    // Mantém layout minimalista, mas usa o novo render apenas para exibir, ou simplifica
                    const topico = DataManager.getTopico(preselectedTopicId);
                    UI.showModal(`
                        <div class="modal-content" style="max-width: 500px;">
                            <h2>📕 Erro Rápido</h2>
                            <small style="color: var(--text-muted); display: block; margin-bottom: 15px;">Tópico: ${topico?.nome}</small>
                            
                            <!-- Hidden Fields para manter compatibilidade com save() -->
                            <input type="hidden" id="neTopico" value="${preselectedTopicId}">
                            
                            <div class="form-group">
                                <select id="neCategoria" style="width: 100%;">
                                    <option value="Atencao">⚠️ Falta de Atenção</option>
                                    <option value="NaoEstudei">📚 Não Estudei</option>
                                    <option value="Pegadinha">🎭 Pegadinha</option>
                                    <option value="Memoria">🧠 Falha na Memória</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <textarea id="neTexto" rows="2" placeholder="O erro..." style="width: 100%;"></textarea>
                            </div>
                            <div class="form-group">
                                <textarea id="neTextoComentario" rows="2" placeholder="Correção..." style="width: 100%;"></textarea>
                            </div>
                            <button onclick="ErrorNotebook.save()" class="btn btn-primary" style="width: 100%;">✅ Salvar</button>
                        </div>
                    `);
                    setTimeout(() => document.getElementById('neTexto')?.focus(), 100);
                } else {
                    // MODO COMPLETO: Navegação Hierárquica
                    UI.showModal(`
                        <div class="modal-content modal-lg">
                            <h2>Registrar Erro</h2>
                            
                            <!-- Seletor Hierárquico -->
                            ${TopicSelector.render(preselectedTopicId)}
                            
                            <div class="form-group" style="margin-top: 15px">
                                <label>Categoria do Erro</label>
                                <select id="neCategoria">
                                    <option value="Atencao">Falta de Atenção (Li errado, pressa)</option>
                                    <option value="NaoEstudei">Não Estudei (Conteúdo novo/esquecido)</option>
                                    <option value="Pegadinha">Pegadinha (Banca maliciosa)</option>
                                    <option value="Memoria">Falha na Memória (Sabia mas esqueci)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>O Erro / Questão</label>
                                <textarea id="neTexto" rows="3" placeholder="Cole o texto da questão ou descreva o erro..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Comentário / Correção</label>
                                <textarea id="neTextoComentario" rows="3" placeholder="Qual o gabarito? Por que errou?"></textarea>
                            </div>
                            <button onclick="ErrorNotebook.save()" class="btn btn-primary">Salvar</button>
                            <button onclick="UI.closeModal()" class="btn btn-secondary">Cancelar</button>
                        </div>
                    `);
                }
            }

            static save() {
                const topicoId = document.getElementById('neTopico').value;
                const categoria = document.getElementById('neCategoria').value;
                const texto = document.getElementById('neTexto').value;
                const comentario = document.getElementById('neTextoComentario').value;

                if (topicoId && texto) {
                    DataManager.addErro({ topicoId, texto, comentario, categoria });
                    UI.closeModal();

                    // 🆕 Se está em sessão ativa, apenas mostra toast
                    if (SessaoGuiada.current) {
                        UI.showToast('✅ Erro registrado! Continue estudando.', 'success');
                    } else {
                        // Se não está em sessão, navega normalmente
                        App.navigate('errors');
                        UI.showToast('Erro registrado no caderno!', 'success');
                    }
                } else {
                    UI.showToast('⚠️ Preencha o tópico e o erro!', 'warning');
                }
            }

            static remove(id) {
                if (confirm('Remover este erro do caderno?')) {
                    DataManager.removeErro(id);
                    App.navigate('errors');
                }
            }

            static startReview() {
                const errors = DataManager.getErros();
                if (errors.length === 0) return UI.showToast('Sem erros para revisar.', 'warning');

                // Shuffle and pick 5
                const selected = errors.sort(() => 0.5 - Math.random()).slice(0, 5);

                let html = `< h1 >🔄 Revisão de Erros</h1 > <div class="card">`;
                selected.forEach((e, idx) => {
                    const t = DataManager.getTopico(e.topicoId) || { nome: '?' };
                    html += `
                    <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border)">
                        <h4>${idx + 1}. ${t.nome}</h4>
                        <p>${e.texto}</p>

                    const last = parseFloat(simulados[0].pontos);

                    const color = diff >= 0 ? 'var(--success)' : 'var(--danger)';
                    const icon = diff >= 0 ? '📈' : '📉';
                    trendHtml = `<div class="card" style="margin-bottom: 20px; border-left: 5px solid ${color}">

        class RelatoriosView {
            static render() {
                const topicos = DataManager.getTopicos();

                const disciplinas = DataManager.getDisciplinas();

                // 1. MACRO STATUS (Edital)
                const statusCounts = { 'nao-iniciado': 0, 'revisao': 0, 'dominio': 0 };
                topicos.forEach(t => {
                    if (t.status === 'nao-iniciado') {
                        statusCounts['nao-iniciado']++;
                    } else if (t.status === 'dominio') {
                        statusCounts['dominio']++;
                    } else {
                        statusCounts['revisao']++;
                    }

        class CronogramaView {
            static render() {
                const topicos = DataManager.getTopicos();
                const config = DataManager.getConfig(); // Para pegar a meta diária se existir, ou calcular média
                const hoje = new Date();
                hoje.setHours(0, 0, 0, 0);

                const schedule = {};
                const backlog = [];
                const recovery = [];

                // 1. Process Topics and Calculate Pace
                let completedLast7Days = 0;
                topicos.forEach(t => {
                    if (t.status === 'nao-iniciado') {
                        backlog.push(t);
                    } else if (t.proximaRevisao) {
                        const dataRev = new Date(t.proximaRevisao.data);
                        dataRev.setHours(0, 0, 0, 0);

                        // Check for Recovery (Low Performance)
                        const isRecovery = t.questoes?.performance !== undefined && t.questoes.performance < SystemRules.VALIDATION.MIN_PERFORMANCE;

                        if (isRecovery) {
                            recovery.push({ ...t, dataRev });
                        }

                        // Add to Schedule (if within 30 days)
                        const diffDays = Math.ceil((dataRev - hoje) / (1000 * 60 * 60 * 24));
                        if (diffDays >= 0 && diffDays <= 30) {
                            const dateKey = dataRev.toISOString().split('T')[0];
                            if (!schedule[dateKey]) schedule[dateKey] = [];
                            schedule[dateKey].push({ ...t, isRecovery });
                        }
                    }

                    // Calculate Pace (Simples)
                    if (t.ultimaRevisao && StudeiUtils.daysSince(t.ultimaRevisao) <= 7) {
                        completedLast7Days++;
                    }
                });

                // Calculate Pace: (completed / 7) or default to 3
                const dailyPace = Math.max(1, Math.round(completedLast7Days / 7)) || 3;

                // 2. Project Backlog onto Schedule
                let currentProjectedDate = new Date(hoje);
                let topicsProjectedToday = 0;

                // Distribui o backlog nos dias futuros
                backlog.forEach(t => {
                    // Encontrar o próximo slot disponível
                    while (true) {
                        const dateKey = currentProjectedDate.toISOString().split('T')[0];
                        if (!schedule[dateKey]) schedule[dateKey] = [];

                        // Conta quantos itens JÁ existem nesse dia (Revisão + Projeção)
                        if (schedule[dateKey].length < dailyPace + 5) { // Limite flexível
                            schedule[dateKey].push({ ...t, isProjected: true });
                            break; // Tópico agendado, vai para o próximo tópico
                        } else {
                            // Dia cheio, avança para o próximo dia
                            currentProjectedDate.setDate(currentProjectedDate.getDate() + 1);
                        }
                    }
                });


                // 3. Build Schedule HTML
                let calendarHtml = '';
                const sortedDates = Object.keys(schedule).sort();

                if (sortedDates.length === 0) {
                    calendarHtml = '<div class="alert alert-info">Nenhuma revisão agendada para os próximos 30 dias.</div>';
                } else {
                    calendarHtml = sortedDates.map(date => {
                        const items = schedule[date];
                        const dateObj = new Date(date + 'T12:00:00');
                        const dayName = dateObj.toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' });
                        const isToday = date === hoje.toISOString().split('T')[0];

                        // Ordenar itens: Recuperação > Revisão > Projetado
                        items.sort((a, b) => {
                            if (a.isRecovery && !b.isRecovery) return -1;
                            if (!a.isRecovery && b.isRecovery) return 1;
                            if (a.isProjected && !b.isProjected) return 1;
                            if (!a.isProjected && b.isProjected) return -1;
                            return 0;
                        });

                        return `
                            <div class="card" style="margin-bottom: 15px; border-left: 5px solid ${isToday ? 'var(--primary)' : 'var(--border)'}">
                                <h3 style="margin-bottom: 10px; display:flex; justify-content:space-between">
                                    <span>${isToday ? 'Hoje, ' : ''}${dayName}</span>
                                    <span class="badge" style="background:var(--bg-lighter)">${items.length} itens</span>
                                </h3>
                                <div style="display:grid; gap:10px">
                                    ${items.map(t => {
                            const assunto = DataManager.getAssunto(t.assuntoId);
                            const disc = DataManager.getDisciplina(assunto?.disciplinaId);

                            let badgeType = '';
                            let extraStyle = '';

                            if (t.isRecovery) {
                                badgeType = `<span class="badge" style="background:#fee2e2; color:#991b1b" title="Desempenho < ${SystemRules.VALIDATION.MIN_PERFORMANCE}% na última sessão">🚑 Recuperação</span>`;

                                badgeType = '<span class="badge" style="background:var(--bg-lighter); color:var(--text-muted); border:1px dashed var(--border)" title="Planejado baseado no seu ritmo atual">🆕 Planejado</span>';
                                extraStyle = 'opacity: 0.8; border: 1px dashed var(--border);';
                            } else {
                                badgeType = '<span class="badge" style="background:rgba(16, 185, 129, 0.1); color:var(--success)">📅 Revisão</span>';
                            }

                            return `
                                            <div style="display:flex; justify-content:space-between; align-items:center; padding:8px; background:var(--bg-secondary); border-radius:4px; ${extraStyle}">
                                                <div>
                                                    <div style="font-weight:600">${t.nome}</div>

                                            </div>
                                        `;
                        }).join('')}
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                // 4. Build Scientific Context Tooltips
                const scienceTooltips = `
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:15px; margin-bottom:20px">
                        <div class="card" style="font-size:0.9rem; border-left:4px solid #fee2e2">

                            <p style="color:var(--text-muted); margin-top:5px">
                                Baseado na <em style="color:var(--text)">Failure of Retrieval</em>. Quando o desempenho cai abaixo de 75%, significa que o traço de memória está fraco. A intervenção imediata é necessária para evitar o "esquecimento completo".
                            </p>

                         <div class="card" style="font-size:0.9rem; border-left:4px solid #d1fae5">

                            </p>
                        </div>
                    </div>
                `;

                return `
                    <div style="max-width: 1000px; margin: 0 auto;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h1>📅 Cronograma Científico</h1>

                                    <div style="margin-top:15px">

            }

            static async quickSave() {
                try {
                    // Tentar usar File System Access API
                    if ('showSaveFilePicker' in window) {
                        let handle = await IDBManager.getHandle();

                        if (!handle) {
                            // Se não tem handle salvo, pedir ao usuário
                            handle = await window.showSaveFilePicker({
                                suggestedName: 'studei_backup.json',
                                types: [{
                                    description: 'Backup JSON',
                                    accept: { 'application/json': ['.json'] },
                                }],
                            });
                            await IDBManager.saveHandle(handle);
                        } else {
                            // Se tem handle, verificar permissão
                            const options = { mode: 'readwrite' };
                            if ((await handle.queryPermission(options)) !== 'granted') {
                                if ((await handle.requestPermission(options)) !== 'granted') {
                                    throw new Error('Permissão negada pelo usuário.');
                                }
                            }
                        }

                        const writable = await handle.createWritable();

                        // Preparar dados
                        const data = {
                            exportDate: new Date().toISOString(),
                            version: '2.0',
                            backupNumber: (StorageManager.load('backup_count') || 0) + 1,
                            data: {}
                        };

                        Object.values(STORAGE_KEYS).forEach(key => {
                            data.data[key] = StorageManager.load(key);
                        });

                        await writable.write(JSON.stringify(data, null, 2));
                        await writable.close();

                        // Registrar backup
                        StorageManager.save('last_backup_date', new Date().toISOString());
                        StorageManager.save('backup_count', data.backupNumber);

                        const fileName = handle.name || 'studei_backup.json';
                        UI.showToast(`✅ Salvo em ${fileName}`, 'success');
                    } else {
                        // Fallback para download normal
                        this.exportBackup();
                    }
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error(err);
                        UI.showToast('❌ Erro ao salvar: ' + err.message, 'error');
                        // Se erro for de permissão ou handle inválido, limpar do IDB para forçar novo picker na próxima
                        if (err.name === 'NotAllowedError' || err.name === 'NotFoundError') {
                            // Opcional: limpar handle inválido se tivéssemos método delete
                        }
                    }
                }
            }

            static cleanupDuplicates() {
                if (!confirm('Remover disciplinas, assuntos e tópicos duplicados?\n\nIsso não apagará dados, apenas consolidará duplicatas.')) return;

                const result = DataManager.cleanupDuplicates();
                const total = result.removedDis + result.removedAss + result.removedTops;

                if (total > 0) {
                    UI.showToast(`🧹 Limpeza concluída! Removidos: ${result.removedDis} disciplinas, ${result.removedAss} assuntos, ${result.removedTops} tópicos duplicados.`, 'success');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    UI.showToast('✅ Nenhuma duplicata encontrada!', 'info');
                }
            }

            static resetAll() {
                if (!confirm('⚠️ ATENÇÃO: Isso apagará TODOS OS DADOS!\n\nNão há como desfazer esta ação!\n\nTem CERTEZA ABSOLUTA?')) return;
                if (!confirm('Última chance! Confirma que deseja apagar tudo?')) return;

                Object.values(STORAGE_KEYS).forEach(key => {
                    StorageManager.remove(key);
                });

                UI.showToast('Todos os dados foram apagados. Recarregando...', 'info');
                setTimeout(() => location.reload(), 1000);
            }
        }

                    this.addAssuntoETopic(dRLM.id, "Geometria e Estatística", [
                        { nome: "Ângulos e triângulos", tamanho: "M" },
                        { nome: "Polígonos, perímetro e área", tamanho: "M" },
                        { nome: "Média, moda, mediana e desvio padrão", tamanho: "M" },
                        { nome: "Plano cartesiano", tamanho: "M" }
                    ]);

                    UI.showToast('✅ Edital PC-SC carregado com sucesso!', 'success');
                    setTimeout(() => location.reload(), 800);
                } catch (error) {
                    console.error(error);
                    UI.showToast('❌ Erro ao carregar edital: ' + error.message, 'error');
                }
            }

            static addAssuntoETopic(disciplinaId, nomeAssunto, topicos) {
                const assunto = DataManager.addAssunto({ disciplinaId, nome: nomeAssunto });
                topicos.forEach(t => {
                    DataManager.addTopico({
                        assuntoId: assunto.id,
                        nome: t.nome,
                        tamanho: t.tamanho,
                        status: 'nao-iniciado',
                        cicloAtual: 0
                    });
                });
            }
        }







        // ===== INITIALIZATION =====
        window.onload = () => App.init();

    </script>
