        class MotorInteligente {


            static calcularProximaRevisao(topico, performance) {
                // Ebbinghaus SRS Logic
                const interval = topico.lastInterval || 1;
                let factor = topico.easeFactor || 2.5;

                // Adjust Easy Factor based on performance (0-100)
                if (performance >= 90) factor += 0.1;
                else if (performance >= 70) factor += 0.0; // Maintain
                else if (performance >= 50) factor -= 0.15;
                else factor -= 0.2;

                if (factor < 1.3) factor = 1.3; // Minimum floor

                let newInterval = Math.round(interval * factor);

                // Erasure handling: if performance is terrible, reset interval
                if (performance < 40) newInterval = 1;

                // 🆕 MAX INTERVAL CAP: Garante revisão periódica mesmo para dominados
                if (SystemRules.SCHEDULER.MAX_INTERVAL) {
                    newInterval = Math.min(newInterval, SystemRules.SCHEDULER.MAX_INTERVAL);
                }

                // Store hidden SRS props on topic
                topico.lastInterval = newInterval;
                topico.easeFactor = factor;

                const nextDate = new Date();
                nextDate.setDate(nextDate.getDate() + newInterval);
                return { data: nextDate.toISOString(), diasRestantes: newInterval };
            }

            static getHeatmapStatus(topico) {
                const inc = topico.incidencia || 'normal';
                const isLate = topico.proximaRevisao && (new Date(topico.proximaRevisao.data) < new Date());

                // Critical Priority: Only if REALLY late (Urgency)
                // High Incidence increases score, but doesn't force 'critical' status unless neglected
                if (isLate && Utils.daysUntil(topico.proximaRevisao.data) < -2) return 'critical'; // 3 days late

                if (!topico.ultimaRevisao) return 'cold';

                const daysSince = (new Date() - new Date(topico.ultimaRevisao)) / (1000 * 60 * 60 * 24);

                // Accelerated decay for high incidence, but looser threshold for 'critical' badge
                // Goal: Don't flood dashboard with red alarms for just "important" items
                if (daysSince > 15 || (inc === 'muito_frequente' && daysSince > 12)) return 'critical';
                if (daysSince > 7 || (inc === 'frequente' && daysSince > 6)) return 'warning';

                return 'safe';
            }

            static calcularPrioridade(topico, config) {
                const disciplinas = DataManager.getDisciplinas(); // Need full list

                // 1. Urgency (Days overdue)
                const hoje = new Date();
                const rev = new Date(topico.proximaRevisao?.data || 0);
                const diasAtraso = Math.max(0, (hoje - rev) / (1000 * 60 * 60 * 24));

                // 2. Weight in Edital
                const assunto = DataManager.getAssunto(topico.assuntoId);
                const disciplina = disciplinas.find(d => d.id === assunto?.disciplinaId);
                const edital = DataManager.getEdital();
                const configDisc = disciplina ? edital.disciplinas[disciplina.id] : null;

                let pesoBase = 5; // Default weight

                // 🆕 UNIFICATION FIX: Prioritize Discipline Object Data
                if (disciplina && disciplina.pesoEdital) {
                    pesoBase = disciplina.pesoEdital;
                } else if (configDisc) {
                    const pts = parseFloat(configDisc.pontos || 1);
                    const qts = parseFloat(configDisc.questoes || 1);
                    pesoBase = (pts / qts) * 5;
                }

                // 3. Score Components
                // Urgência: Cap at MAX_URGENCY_SCORE (100 pts ~ 40 days)
                const urgenciaScore = Math.min(diasAtraso * SystemRules.SCHEDULER.URGENCY_PER_DAY, SystemRules.SCHEDULER.MAX_URGENCY_SCORE);

                // Peso: Boost Factor (10x)
                const pesoScore = pesoBase * SystemRules.SCHEDULER.WEIGHT_BOOST_FACTOR;

                // 4. Size-based ROI adjustment (subtle, not punitive)
                const roiFactors = { 'P': 1.15, 'M': 1.0, 'G': 0.85 };
                const roiFactor = roiFactors[topico.tamanho] || 1.0;

                // Base score
                let score = (urgenciaScore + pesoScore) * roiFactor;

                // 5. Critical bonuses
                let recoveryBonus = 0;
                let criticalBonus = 0;
                let newTopicBonus = 0;

                if (this.getHeatmapStatus(topico) === 'critical') {
                    criticalBonus = 25;
                    score += criticalBonus;
                }

                if (topico.status === 'nao-iniciado') {
                    newTopicBonus = config.faseAtual === 'pre' ? 15 : 5;
                    score += newTopicBonus;
                }

                // 🚨 RECOVERY BOOST: Se está em recuperação (< MIN_PERFORMANCE), ganha prioridade MÁXIMA
                if (topico.questoes?.performance !== undefined && topico.questoes.performance < SystemRules.VALIDATION.MIN_PERFORMANCE) {
                    recoveryBonus = SystemRules.SCHEDULER.RECOVERY_PRIORITY_BOOST; // Garante topo da lista (fura fila)
                    score += recoveryBonus;
                } else if (topico.questoes?.performance && topico.questoes.performance < 50) {
                    recoveryBonus = 10; // Boost weak topics (legacy check)
                    score += recoveryBonus;
                }

                // 6. Multiplicador de Incidência (1 a 10)
                const multiplicadorIncidencia = this.getMultiplicadorIncidencia(topico.incidencia);
                score = score * multiplicadorIncidencia;

                // 🆕 TRANSPARENCY: Attach breakdown to topic for tooltip
                topico.scoreBreakdown = {
                    base: { label: `Peso (${pesoBase})`, val: Math.round(pesoScore) },
                    urgency: { label: `Urgência (${Math.round(diasAtraso)}d)`, val: Math.round(urgenciaScore) },
                    roi: { label: `Tamanho (${topico.tamanho || 'M'})`, val: `x${roiFactor}` },
                    bonuses: { critical: criticalBonus, recovery: recoveryBonus, new: newTopicBonus },
                    mult: { label: `Incidência`, val: `x${multiplicadorIncidencia.toFixed(2)}` },
                    total: Math.round(Math.max(0, score))
                };

                return Math.max(0, score);
            }

            static getMultiplicadorIncidencia(incidencia) {
                // Compatibilidade com legado (texto)
                if (typeof incidencia === 'string') {
                    const map = {
                        'muito_frequente': 9,
                        'frequente': 7,
                        'normal': 5,
                        'pouco_frequente': 2
                    };
                    incidencia = map[incidencia] || 5;
                }

                // Garante que é número e está entre 1 e 10
                const valor = Math.min(10, Math.max(1, parseInt(incidencia) || 5));

                // Fórmula: 0.5 + (Nota * 0.15)
                // 1 = 0.65x | 5 = 1.25x | 10 = 2.0x
                return 0.5 + (valor * 0.15);
            }

            static getStudyQueues() {
                const topicos = DataManager.getTopicos();
                const config = DataManager.getConfig();

                const queues = {
                    review: [],     // Revisão & Validação (Manutenção)
                    new: [],        // Novos (Expansão)
                    recovery: []    // Recuperação (Correção)
                };

                topicos.forEach(t => {
                    t.score = this.calcularPrioridade(t, config);

                    // Recovery Logic: Low performance
                    const isRecovery = t.questoes?.performance !== undefined && t.questoes.performance < 75;

                    // Date Logic
                    const daysOverdue = t.proximaRevisao ? StudeiUtils.daysUntil(t.proximaRevisao.data) : 0; // <= 0 means Today or Past
                    const isReady = daysOverdue <= 0;

                    if (t.status === 'nao-iniciado') {
                        queues.new.push(t);
                    } else if (isRecovery) {
                        queues.recovery.push(t);
                    } else if (isReady) {
                        // Includes active reviews and pending validations that are due/ready
                        queues.review.push(t);
                    }
                });

                // Sort Queues
                const sortScore = (a, b) => b.score - a.score;

                // Review: Priority Score (Urgency + Weight)
                queues.review.sort(sortScore);

                // New: Priority Score (Weight + ROI)
                queues.new.sort(sortScore);

                // Recovery: Lowest performance first (Critical fix)
                queues.recovery.sort((a, b) => (a.questoes?.performance || 0) - (b.questoes?.performance || 0));

                return queues;
            }

            static getDailyMission(limit = 4) {
                const queues = this.getStudyQueues();
                const mission = [];

                // ✅ FIX: Janela de 10 sessões para detectar disciplinas dominantes
                const sessoes = DataManager.getSessoes().sort((a, b) => new Date(b.data) - new Date(a.data));
                const recentSessoes = sessoes.slice(0, 10);

                // Contar disciplinas nas últimas 10 sessões
                const recentDiscCount = {};
                const resolveDiscIdFromSession = (s) => {
                    const t = DataManager.getTopico(s.topicoId);
                    if (!t) return null;
                    const a = DataManager.getAssunto(t.assuntoId);
                    return a ? a.disciplinaId : null;
                };
                recentSessoes.forEach(s => {
                    const dId = resolveDiscIdFromSession(s);
                    if (dId) recentDiscCount[dId] = (recentDiscCount[dId] || 0) + 1;
                });

                // Aplicar penalização de score para disciplinas sobre-representadas (> 3 de 10)
                const applyDiversityPenalty = (topicsList) => {
                    return topicsList.map(t => {
                        const a = DataManager.getAssunto(t.assuntoId);
                        const dId = a ? a.disciplinaId : null;
                        const count = dId ? (recentDiscCount[dId] || 0) : 0;
                        if (count > 3) {
                            // Penalidade crescente: cada sessão extra acima de 3 reduz 15% do score
                            const penalty = 1 - Math.min((count - 3) * 0.15, 0.60);
                            return { ...t, score: t.score * penalty, _diversityPenalty: penalty };
                        }
                        return t;
                    }).sort((a, b) => b.score - a.score); // Reordenar após penalidade
                };

                // Aplicar penalidade nas filas
                queues.review = applyDiversityPenalty(queues.review);
                queues.new = applyDiversityPenalty(queues.new);

                // Disciplina a evitar = a mais recente (memória de 1 para interleave imediato)
                let avoidDiscId = null;
                if (recentSessoes.length > 0) {
                    avoidDiscId = resolveDiscIdFromSession(recentSessoes[0]);
                }

                // 🎯 Fórmula da Missão Diária (War Room Strategy)
                // 50% Revisão/Validação (Manutenção Crítica)
                // 25% Recuperação (Correção de Erros)
                // 25% Novos (Expansão Controlada)

                const slotsReview = Math.ceil(limit * 0.5); // 2
                const slotsRecovery = Math.ceil(limit * 0.25); // 1
                const slotsNew = limit - slotsReview - slotsRecovery; // 1

                // 1. Fill Reviews (Critical First) - INTERLEAVED
                const reviewCandidates = this.interleaveItems(queues.review, slotsReview, [], avoidDiscId);
                mission.push(...reviewCandidates);

                // 2. Fill Recovery
                if (queues.recovery.length > 0) {
                    // Recuperação geralmente é urgente e específica, não necessariamente precisa de interleave se for pouca coisa, 
                    // mas podemos aplicar se houver muitas. Como é 'correção de erro', a diversidade é menos crítica que a urgência.
                    // Mantemos direto por enquanto para focar no erro mais grave.
                    mission.push(...queues.recovery.slice(0, slotsRecovery));
                } else {
                    // Se não tiver recuperação, puxa mais revisão (Interleaved)
                    // Precisamos pegar mais itens da fila de review que AINDA NÃO FORAM USADOS.
                    const usedIds = new Set(mission.map(t => t.id));
                    const remainingReview = queues.review.filter(t => !usedIds.has(t.id));
                    // 🆕 FIX: Pass 'mission' context
                    const extraRev = this.interleaveItems(remainingReview, slotsRecovery, mission, avoidDiscId);
                    mission.push(...extraRev);
                }

                // 3. Fill New - INTERLEAVED
                if (queues.new.length > 0) {
                    // 🆕 FIX: Pass 'mission' context
                    const newCandidates = this.interleaveItems(queues.new, slotsNew, mission, avoidDiscId);
                    mission.push(...newCandidates);
                } else {
                    // Se não tiver novos, puxa mais revisão/recuperação
                    const usedIds = new Set(mission.map(t => t.id));
                    const pool = [...queues.review, ...queues.recovery].filter(t => !usedIds.has(t.id));
                    // Re-sort pool by score just in case mixed
                    pool.sort((a, b) => b.score - a.score);

                    const needed = limit - mission.length;
                    // 🆕 FIX: Pass 'mission' context
                    const extra = this.interleaveItems(pool, needed, mission, avoidDiscId);
                    mission.push(...extra);
                }

                // Fallback final: Preencher buracos
                while (mission.length < limit) {
                    const usedIds = new Set(mission.map(t => t.id));
                    const pool = [...queues.review, ...queues.recovery, ...queues.new]
                        .filter(t => !usedIds.has(t.id))
                        .sort((a, b) => b.score - a.score); // Sempre reordenar por score no fallback

                    // 🆕 FIX: Pass 'mission' context
                    const nextReceiver = this.interleaveItems(pool, 1, mission, avoidDiscId)[0];

                    if (nextReceiver) mission.push(nextReceiver);
                    else break;
                }

                return mission;
            }

            // 🆕 INTERLEAVING ENGINE (Diversidade Forense)
            // Garante que não estudaremos a mesma matéria seguidas vezes se houver opções
            static interleaveItems(candidates, count, previousItems = [], avoidDiscId = null) {
                if (candidates.length === 0 || count <= 0) return [];

                const result = [];
                const pool = [...candidates]; // Cópia para não alterar original

                // Agrupar por Disciplina (via Assunto)
                // Precisamos resolver a disciplina de cada tópico
                const getDiscId = (t) => {
                    const a = DataManager.getAssunto(t.assuntoId);
                    return a ? a.disciplinaId : 'unknown';
                };

                // Estratégia: Round Robin baseada em relevância
                // 1. Pega o top 1 de cada disciplina disponível
                // 2. Ordena esses 'líderes' pelo score original
                // 3. Escolhe o melhor.
                // 4. Remove do pool e repete.

                // Evitar repetir a disciplina do último item adicionado (se possível)
                let lastDiscId = previousItems.length > 0 ? getDiscId(previousItems[previousItems.length - 1]) : avoidDiscId;

                while (result.length < count && pool.length > 0) {
                    // Agrupa itens restantes
                    const groups = {};
                    pool.forEach(t => {
                        const dId = getDiscId(t);
                        if (!groups[dId]) groups[dId] = [];
                        groups[dId].push(t);
                    });

                    // Identificar os candidatos líderes de cada grupo
                    // (O pool já deve vir ordenado por score, então o [0] do grupo é o melhor daquela disciplina)
                    let leaders = Object.keys(groups).map(dId => groups[dId][0]);

                    // Filtrar disciplina repetida imediata (apenas se houver outra opção)
                    if (leaders.length > 1 && lastDiscId) {
                        const nonRepeating = leaders.filter(t => getDiscId(t) !== lastDiscId);
                        if (nonRepeating.length > 0) {
                            leaders = nonRepeating;
                        }
                    }

                    // Escolher o líder com maior score global
                    leaders.sort((a, b) => b.score - a.score);
                    const winner = leaders[0];

                    if (winner) {
                        result.push(winner);
                        lastDiscId = getDiscId(winner);
                        // Remove winner from pool
                        const idx = pool.findIndex(t => t.id === winner.id);
                        if (idx > -1) pool.splice(idx, 1);
                    } else {
                        break; // Should not happen
                    }
                }

                return result;
            }


            static gerarCiclo(tamanho = null) {
                // Compatibility wrapper for legacy calls (if any)
                // We prefer using getStudyQueues directly in Dashboard
                const queues = this.getStudyQueues();
                return [...queues.recovery, ...queues.review, ...queues.new].slice(0, tamanho || 10);
            }
        }


        class SystemAuditor {
            static getAlerts() {
                const alerts = [];
                const topicos = DataManager.getTopicos();

                const weak = topicos.filter(t => (t.questoes?.performance || 0) < 50 && (t.questoes?.total || 0) > 5);
                if (weak.length) alerts.push({ type: 'alert-danger', icon: '⚠️', title: 'Atenção', msg: `${weak.length} tópicos com performance crítica.` });

                // Rigid Scheduler / Debt Check
                const debt = this.checkDebt();
                if (debt.isCritical) {
                    alerts.push({
                        type: 'alert-warning',
                        icon: '📅',
                        title: 'Revisões Pendentes',
                        msg: `${debt.pendingCount} tópicos aguardando revisão (mais urgente: ${debt.maxDays}d pendente). Foque nas prioritárias antes de avançar.`
                    });
                } else if (debt.pendingCount > 0) {
                    alerts.push({ type: 'alert-warning', icon: '📅', title: 'Atenção', msg: `${debt.pendingCount} revisões pendentes.` });
                }

                return alerts;
            }

            static checkDebt() {
                const topicos = DataManager.getTopicos();

                // ✅ FIX: Conta tópicos únicos pendentes, NÃO soma dias
                // Métrica real: quantos tópicos distintos estão aguardando revisão?
                const topicosAguardando = topicos.filter(t =>
                    t.status !== 'nao-iniciado' &&
                    t.proximaRevisao &&
                    Utils.daysUntil(t.proximaRevisao.data) <= 0
                );

                const pendingCount = topicosAguardando.length;
                const maxDays = topicosAguardando.length > 0
                    ? Math.max(...topicosAguardando.map(t => Math.abs(Utils.daysUntil(t.proximaRevisao.data))))
                    : 0;

                // Crítico só se houver muitos tópicos OU um muito atrasado (>14 dias)
                const isCritical = pendingCount > SystemRules.SCHEDULER.DEBT_THRESHOLD_TOPICS || maxDays > SystemRules.SCHEDULER.DEBT_MAX_SINGLE_DAYS;

                return { isCritical, pendingCount, maxDays };
            }

            // 🆕 SISTEMA DE VALIDAÇÕES - Progressão baseada em evidências
            static processarFinalizacaoSessao(sessao, topico) {
                const tipo = sessao.tipo;

                switch (tipo) {
                    case 'estudo':
                        return this.processarEstudo(sessao, topico);
                    case 'questoes':
                        return this.processarQuestoes(sessao, topico);
                    case 'revisao':
                        return this.processarRevisao(sessao, topico);
                    case 'blitz': // 🆕 Handle Blitz
                        return this.processarBlitz(sessao, topico);
                    default:
                        return { mensagem: 'Tipo de sessão desconhecido' };
                }
            }

            // ... (processarEstudo, processarQuestoes, processarRevisao remain unchanged)

            // 🆕 PROCESSAMENTO BLITZ: A FUSÃO
            static processarBlitz(sessao, topico) {
                const performance = (sessao.certas / sessao.total) * 100;
                const minPerformance = 75; // 75% Hardcoded for Blitz (High Bar)

                // Unlock Logic Tracking
                const userStats = DataManager.getUserStats() || { blitzCount: 0, unlockedSlots: 0 };

                if (performance >= minPerformance) {
                    // SUCESSO!
                    // Avança 1 Ciclo Completo (Pula a etapa de 'aguardando-validacao')
                    const cicloAtual = topico.cicloAtual || 1;
                    const proximoCiclo = cicloAtual + 1;

                    topico.cicloAtual = proximoCiclo;

                    // Se chegar ao final (5), vira Dominado?
                    if (proximoCiclo > SystemRules.VALIDATION.DOMINIO_COUNT) {
                        topico.status = 'dominio';
                        topico.proximaRevisao = MotorInteligente.calcularProximaRevisao(topico, 100);
                    } else {
                        // Vai para Revisão do próximo ciclo
                        topico.status = `revisao-${proximoCiclo}`;
                        // Agenda próxima revisão com intervalo cheio (resetando SRS para este nível)
                        const intervals = SystemRules.VALIDATION.MATURATION_INTERVALS;
                        const daysToWait = intervals[proximoCiclo - 1] || 30;
                        const nextDate = new Date();
                        nextDate.setDate(nextDate.getDate() + daysToWait);
                        topico.proximaRevisao = { data: nextDate.toISOString() };
                    }

                    // Log Blitz Success
                    userStats.blitzCount = (userStats.blitzCount || 0) + 1;
                    let unlockMsg = '';

                    if (userStats.blitzCount % SystemRules.BLITZ.UNLOCK_RATIO === 0) {
                        userStats.unlockedSlots = (userStats.unlockedSlots || 0) + 1;
                        unlockMsg = '<br>🔓 <strong>NOVA MATÉRIA DESBLOQUEADA!</strong> (Pagar para Crescer)';
                    }
                    DataManager.saveUserStats(userStats);

                    return {
                        mensagem: `⚡ <strong>BLITZ SUCESSO!</strong> (${performance.toFixed(0)}%)<br>
                                   Você pulou uma etapa inteira e avançou para o Ciclo ${proximoCiclo}.
                                   ${unlockMsg}`,
                        proximaAcao: 'revisao',
                        aprovado: true
                    };

                } else {
                    // FALHA BLITZ
                    // Cai para recuperação, igual a falha de questão normal
                    const cicloDestino = topico.cicloAtual >= 3 ? 3 : Math.max(1, topico.cicloAtual - 1);
                    topico.cicloAtual = cicloDestino;
                    topico.status = `revisao-${cicloDestino}`;

                    const amanha = new Date();
                    amanha.setDate(amanha.getDate() + 1);
                    topico.proximaRevisao = { data: amanha.toISOString() };

                    return {
                        mensagem: `⚡⚠️ <strong>BLITZ FALHOU</strong> (${performance.toFixed(0)}%)<br>
                                   O "Refresh" não foi suficiente. Voltamos para o Ciclo ${cicloDestino} para reforçar.`,
                        proximaAcao: 'revisao',
                        regressao: true,
                        aprovado: false
                    };
                }
            }

            // ... (verificarDominio remains unchanged)

            static processarEstudo(sessao, topico) {
                // Primeira vez estudando
                if (topico.status === 'nao-iniciado') {
                    topico.status = 'em-estudo';
                    topico.cicloAtual = 1;
                }

                // Se concluiu o estudo (finalizou = true)
                if (sessao.finalizou) {
                    topico.status = `aguardando-validacao-${topico.cicloAtual}`;

                    // 🆕 ESPAÇAMENTO FORÇADO (Interleaving)
                    // Não validar no mesmo dia. O cérebro precisa de sono para consolidação.
                    // Agendar próxima ação para AMANHÃ.
                    const amanha = new Date();
                    amanha.setDate(amanha.getDate() + 1);
                    topico.proximaRevisao = { data: amanha.toISOString() }; // Define data futura

                    const actionName = (topico.cicloAtual || 1) === 1 ? 'PRÁTICA' : 'QUESTÕES';

                    return {
                        mensagem: `📚 Estudo concluído! O tópico entrou em ❄️ Resfriamento (Consolidação). Amanhã você fará ${actionName} para validar.`,
                        proximaAcao: 'questoes',
                        bloqueios: ['estudo', 'revisao']
                    };
                }

                return { mensagem: 'Estudo em andamento...' };
            }

            static processarQuestoes(sessao, topico) {
                const performance = (sessao.certas / sessao.total) * 100;
                const minQuestoes = SystemRules.VALIDATION.MIN_QUESTIONS;

                // 🆕 Tiered Performance based on Cycle
                const currentCycle = topico.cicloAtual || 1;
                const tiers = SystemRules.VALIDATION.PERFORMANCE_TIERS;
                // Use tier for current cycle (index = cycle - 1), fallback to last tier
                const minPerformance = tiers[currentCycle - 1] || tiers[tiers.length - 1];

                if (sessao.total < minQuestoes) {
                    return {
                        mensagem: `⚠️ Mínimo de ${minQuestoes} questões necessárias para validação. Você fez apenas ${sessao.total}.`,
                        permitirSalvar: false
                    };
                }

                const validacao = {
                    ciclo: topico.cicloAtual,
                    tipo: 'questoes',
                    performance: performance,
                    questoes: sessao.total,
                    certas: sessao.certas,
                    data: new Date().toISOString(),
                    falhou: performance < minPerformance
                };

                topico.validacoes = topico.validacoes || [];
                topico.validacoes.push(validacao);

                if (performance >= minPerformance) {
                    topico.status = `revisao-${topico.cicloAtual}`;
                    topico.proximaRevisao = MotorInteligente.calcularProximaRevisao(topico, performance);

                    return {
                        mensagem: `✅ Validação ${topico.cicloAtual} APROVADA! (${performance.toFixed(0)}% >= ${minPerformance}%) - Próximo: REVISÃO`,
                        proximaAcao: 'revisao',
                        bloqueios: ['estudo', 'questoes'],
                        aprovado: true
                    };
                } else {
                    // 🆕 RUTHLESS REGRESSION:
                    // If failing at a high level (Consolidation Phase, cycle >= 3), drop back to Cycle 3 (Praticante).
                    // If failing at low level (Learning Phase, cycle 1 or 2), drop to Cycle 1.
                    let cicloDestino = 1;
                    if (topico.cicloAtual >= 3) {
                        cicloDestino = 3; // "Praticante" floor
                    } else {
                        cicloDestino = Math.max(1, topico.cicloAtual - 1);
                    }

                    topico.cicloAtual = cicloDestino;
                    topico.status = `revisao-${cicloDestino}`;

                    // ✅ FIX 3: Regressão Inteligente — Intervalo proporcional à gravidade da falha
                    // Princípio Bjork: "Dificuldade desejável" — não punir amanhã se a falha foi marginal
                    let diasParaVoltar = 1;
                    if (performance >= 60) {
                        diasParaVoltar = 5;   // Quase passou (60-74%): boa base, espera 5 dias
                    } else if (performance >= 40) {
                        diasParaVoltar = 3;   // Razoável (40-59%): precisa consolidar, 3 dias
                    } else {
                        diasParaVoltar = 1;   // Muito ruim (<40%): reforço imediato amanhã
                    }
                    const dataVolta = new Date();
                    dataVolta.setDate(dataVolta.getDate() + diasParaVoltar);
                    topico.proximaRevisao = { data: dataVolta.toISOString() };

                    const intervaloMsg = diasParaVoltar === 1 ? 'amanhã' : `em ${diasParaVoltar} dias`;
                    return {
                        mensagem: `⚠️ Performance (${performance.toFixed(0)}%) abaixo da régua (${minPerformance}%).
                                   <br><br>
                                   🧠 <strong>STUDEI Coach:</strong> Regressão Tática para o Nível ${cicloDestino}. 
                                   Revisão agendada ${intervaloMsg} — sem pressa, o cérebro consolida melhor com espaçamento.`,
                        proximaAcao: 'revisao',
                        regressao: true,
                        aprovado: false
                    };
                }
            }

            static processarRevisao(sessao, topico) {
                const proximoCiclo = (topico.cicloAtual || 1) + 1;

                // 🆕 Updated Check for 5 Cycles
                if (topico.cicloAtual >= SystemRules.VALIDATION.DOMINIO_COUNT) {
                    // Last check: must not have failed recently
                    const ultimaValidacao = topico.validacoes && topico.validacoes.length > 0 ?
                        topico.validacoes[topico.validacoes.length - 1] : null;

                    const emRecuperacao = ultimaValidacao && ultimaValidacao.falhou;

                    if (!emRecuperacao && this.verificarDominio(topico)) {
                        topico.status = 'dominio';
                        topico.proximaRevisao = MotorInteligente.calcularProximaRevisao(topico, 100);
                        return {
                            mensagem: '🎯👑 TÓPICO DOMINADO! Você completou o Caminho do Mestre (5 Fases)!',
                            dominio: true
                        };
                    }
                }

                topico.cicloAtual = proximoCiclo;
                topico.status = `aguardando-validacao-${proximoCiclo}`;

                // 🆕 FORCED MATURATION INTERVALS
                // Instead of generic SRS, force specific wait times for the consolidation phases
                const intervals = SystemRules.VALIDATION.MATURATION_INTERVALS;
                // proximoCiclo is 1-based (2, 3, 4, 5). Index of interval for NEXT validation.
                // If transitioning to Cycle 2, used intervals[1] (3 days)
                let daysToWait = intervals[proximoCiclo - 1] || 1;

                const nextDate = new Date();
                nextDate.setDate(nextDate.getDate() + daysToWait);

                topico.proximaRevisao = { data: nextDate.toISOString() };

                return {
                    mensagem: `🔄 Fase ${topico.cicloAtual - 1} concluída. Próxima Validação em ${daysToWait} dias.`,
                    proximaAcao: 'questoes',
                    bloqueios: ['estudo', 'revisao']
                };
            }

            static verificarDominio(topico) {
                const validacoes = topico.validacoes || [];

                // Precisa de N validações aprovadas
                const validacoesAprovadas = validacoes.filter(v =>
                    !v.falhou && v.performance >= 70 // Base sanity check
                );

                return validacoesAprovadas.length >= SystemRules.VALIDATION.DOMINIO_COUNT;
            }
        }

            }

        class SessaoGuiada {
            static current = null; static timerInterval = null;
            static iniciar(topicoId, tipoForcado = null) {
                const topico = DataManager.getTopico(topicoId);

                // 🆕 Lógica Inteligente de Progressão (Unificada com Dashboard)
                let tipo = tipoForcado;

                if (!tipo) {
                    if (topico.status === 'nao-iniciado' || topico.status === 'em-andamento') {
                        tipo = 'estudo';
                    }
                    else if (!topico.questoes || topico.questoes.total === 0) {
                        tipo = 'revisao';
                    }
                    else if (topico.questoes.performance < 70) {
                        tipo = 'revisao';
                    }
                    else {
                        tipo = 'questoes';
                    }
                }

                // Integrated Review: Check for Bizus and Errors
                const bizus = DataManager.getBizus?.()?.filter(b => b.topicoId === topicoId) || [];
                const errors = DataManager.getErros?.()?.filter(e => e.topicoId === topicoId) || [];

                // 🆕 PROTOCOLO ACTIVE RECALL (Ebbinghaus Flow)
                // Só ativa se: É Revisão E Tópico Relevante (Incidência >= 4) E Tem conteúdo para comparar (Bizus/Erros)
                // Ignora se for a primeira vez (nunca estudado)
                const isRelevant = (parseInt(topico.incidencia) || 5) >= 4;
                const hasMaterial = bizus.length > 0 || errors.length > 0;
                const isFirstTime = topico.status === 'nao-iniciado';

                if (tipo === 'revisao' && isRelevant && hasMaterial && !isFirstTime) {
                    this.showActiveRecallScreen(topico, bizus, errors, tipo);
                } else if (bizus.length > 0 || errors.length > 0) {
                    // Fallback para tela clássica se não for elegível para Active Recall
                    this.showRecallScreen(topico, bizus, errors, tipo);
                } else {
                    this.startSession(topico, tipo);
                }
            }

            static showActiveRecallScreen(topico, bizus, errors, tipo) {
                // Prepara o "Resumão" (Bizus + Erros) mas deixa ESCONDIDO (Blur)
                const resumaoHtml = `
                    <div id="resumaoContent" class="blur-content" style="margin-top:20px; filter: blur(12px); pointer-events: none; user-select: none; transition: all 0.5s ease">

                            <h3 style="color: var(--primary)">📑 Resumão de Ouro</h3>
                            ${bizus.length ? `<div style="margin-bottom:15px"><strong>Dicas Matadoras:</strong><br>${bizus.map(b => `• ${b.titulo}: ${b.conteudo}`).join('<br>')}</div>` : ''}
                            ${errors.length ? `<div><strong>Pontos de Atenção (Erros Passados):</strong><br>${errors.map(e => `• ${e.texto} (${e.comentario || ''})`).join('<br>')}</div>` : ''}
                        </div>
                    </div>
                `;

                UI.showModal(`
                    <div class="modal-content modal-lg">
                        <div style="text-align:center; margin-bottom: 20px">
                            <h1 style="font-size: 3rem; margin-bottom: 0">🧠 Active Recall</h1>
                            <p style="color: var(--text-muted)">Protocolo de Recuperação Ativa • Ebbinghaus Flow</p>
                        </div>
                        
                        <div class="card" style="text-align: center; border: 2px dashed var(--primary)">
                            <h3 style="margin-bottom: 10px">O que você lembra sobre: <strong>${topico.nome}</strong>?</h3>
                            <p style="font-style:italic; color:var(--text-muted); margin-bottom:20px">
                                "O esforço de lembrar é o que fortalece a memória."
                            </p>

                            <textarea id="blurtingArea" placeholder="Digite aqui o que vier à mente (keywords, conceitos, fórmulas)... ou apenas pense com força!" 
                                style="width:100%; height:100px; padding:15px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); margin-bottom:15px;"
                                oninput="SessaoGuiada.handleTyping()"></textarea>

                            <div style="display:flex; justify-content:center; gap:15px; align-items:center">
                                <div id="timerContainer" style="display:none; color:var(--success); font-weight:bold">
                                    ⏱️ <span id="effortTimer">0</span>s (XP Bônus Ativo!)
                                </div>
                            </div>
                        </div>

                        ${resumaoHtml}

                        <div style="margin-top: 30px; display: flex; gap: 10px">
                            <button id="btnReveal" onclick="SessaoGuiada.revealMaterial('${topico.id}', '${tipo}')" class="btn btn-primary btn-lg" style="flex: 2">
                                👁️ Conferir Mentalmente / Revelar

                                ⏩ Pular (Sem XP)
                            </button>
                        </div>
                    </div>
                `);

                // Inicia contador de esforço
                this.effortSeconds = 0;
                this.effortInterval = setInterval(() => {

                    if (timerEl) {
                        timerEl.innerText = this.effortSeconds;
                        if (this.effortSeconds > 5) document.getElementById('timerContainer').style.display = 'block';
                    }

            }

            static revealMaterial(topicoId, tipo) {
                clearInterval(this.effortInterval);

                // Revela o conteúdo
                const content = document.getElementById('resumaoContent');
                content.style.filter = 'blur(0)';
                content.style.pointerEvents = 'auto';
                content.style.userSelect = 'auto';

                // Calcula XP Bônus (Baseado no tempo de esforço, max 60s)
                const bonusXP = Math.min(this.effortSeconds, 60) * 0.5; // 0.5 XP por segundo de esforço

                if (bonusXP > 5) {
                    Gamification.addXP(Math.ceil(bonusXP));
                    UI.showToast(`🧠 +${Math.ceil(bonusXP)} XP de Esforço Mental!`, 'success');
                }

                // Muda botões
                const btnReveal = document.getElementById('btnReveal');
                btnReveal.innerText = '🚀 Iniciar Sessão (Agora com Material Fresco)';
                btnReveal.onclick = () => {
                    UI.closeModal();
                    const topico = DataManager.getTopico(topicoId);
                    this.startSession(topico, tipo);
                };
            }

            static skipActiveRecall(topicoId, tipo) {
                clearInterval(this.effortInterval);
                UI.closeModal();
                const topico = DataManager.getTopico(topicoId);
                this.startSession(topico, tipo);
            }

            static showRecallScreen(topico, bizus, errors, tipo) {
                // Tela Clássica (Fallback ou para tópicos menores)
                const html = `
                    <div style="max-width: 800px; margin: 0 auto">
                        <div class="hero-header" style="background: var(--warning); color: black">
                            <span>🧠 RECALL / PRÉ-VOO</span>
                            <span>Antes de começar, revise isso!</span>
                        </div>
                        <h2>${topico.nome}</h2>
                        
                        <div class="card" style="margin-bottom: 20px; border-left: 4px solid var(--info)">
                            <h3>🧘 Ritual de Preparação</h3>
                            <div style="display:flex; gap:15px; flex-wrap:wrap">
                                <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="ritPhone"> 📵 Celular longe</label>
                                <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="ritWater"> 💧 Água</label>
                                <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="ritMind"> 🧠 Foco (Respira)</label>
                            </div>
                        </div>
                        
                        ${bizus.length ? `
                            <div class="card" style="border-left: 4px solid var(--warning); margin-bottom: 20px">
                                <h3 style="color: var(--warning); display: flex; align-items: center; gap: 8px;">
                                    💡 Bizus Relacionados <span class="badge" style="background:var(--warning); color:black; font-size:0.7em">${bizus.length}</span>
                                </h3>
                                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                                    ${bizus.map(b => `
                                        <div style="background: rgba(255, 193, 7, 0.1); border: 1px solid rgba(255, 193, 7, 0.3); padding: 12px; border-radius: 6px;">
                                            <div style="font-weight: bold; color: #d39e00; margin-bottom: 5px; font-size: 0.95em;">
                                                ${b.titulo || 'Dica Importante'}
                                            </div>
                                            <div style="color: var(--text); font-size: 0.9em; white-space: pre-wrap; line-height: 1.4;">${b.conteudo || b.texto || '...'}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${errors.length ? `
                            <div class="card" style="border-left: 4px solid var(--danger); margin-bottom: 20px">
                                <h3>📕 Erros Anteriores</h3>
                                ${errors.map(e => `
                                    <div style="padding:10px; border-bottom:1px solid #eee">
                                        <div style="color:var(--danger); font-weight:bold; margin-bottom:5px">Questão/Erro:</div>
                                        <div style="margin-bottom:5px">${e.texto}</div>
                                        <div style="background:#f9f9f9; padding:5px; font-style:italic">Cor: ${e.comentario}</div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                        
                        <button onclick="SessaoGuiada.confirmRitualAndStart('${topico.id}', '${tipo}')" class="btn btn-primary btn-lg" style="width:100%">✅ Li tudo e Cumpri o Ritual</button>
                    </div>
                `;
                App.renderView(html);
            }

            static confirmRitualAndStart(id, tipo) {
                const p = document.getElementById('ritPhone').checked;
                const w = document.getElementById('ritWater').checked;
                const m = document.getElementById('ritMind').checked;

                if (!p || !w || !m) return UI.showToast('⚠️ Complete o Ritual de Preparação antes de começar!', 'warning');

                this.startSessionFromId(id, tipo);
            }

            // 🆕 Validação de Fluxo - Impede sessões incorretas
            static validarInicioSessao(topico, tipo) {
                // Se aguardando validação, SÓ permite questões
                if (topico.status && topico.status.includes('aguardando-validacao')) {
                    if (tipo !== 'questoes') {
                        UI.showModal(`
                            <div class="modal-content">
                                <div class="alert alert-warning">
                                    <h3>⚠️ Validação Pendente</h3>
                                    <p>Você precisa fazer <strong>QUESTÕES</strong> para validar seu aprendizado antes de continuar.</p>
                                    <p style="margin-top: 10px">
                                        <strong>Requisitos:</strong><br>
                                        • Mínimo de <strong>${SystemRules.VALIDATION.MIN_QUESTIONS} questões</strong><br>
                                        • Performance mínima de <strong>${SystemRules.VALIDATION.MIN_PERFORMANCE}%</strong>
                                    </p>
                                    <hr style="opacity: 0.2; margin: 10px 0">
                                    <p style="font-size: 0.85rem; font-style: italic">
                                        🧠 <strong>STUDEI Coach:</strong> Seguir sem validar cria a "Ilusão de Competência". Testar sua memória agora garante que você realmente aprendeu e não apenas decorou no curto prazo. 
                                        <a href="#" onclick="UI.closeModal(); App.navigate('methodology')" style="color: var(--primary)">Saber mais...</a>
                                    </p>
                                </div>
                                <div style="margin-top: 20px; display: flex; gap: 10px">
                                    <button onclick="UI.closeModal(); SessaoGuiada.iniciar('${topico.id}', 'questoes')" class="btn btn-primary" style="flex: 1">
                                        Fazer Questões Agora
                                    </button>
                                    <button onclick="UI.closeModal()" class="btn btn-secondary">Cancelar</button>
                                </div>
                            </div>
                        `);
                        return false;
                    }
                }

                // Se em revisão, SÓ permite revisão
                if (topico.status && topico.status.includes('revisao-')) {
                    if (tipo !== 'revisao') {
                        const ciclo = topico.status.split('-')[1];
                        UI.showModal(`
                            <div class="modal-content">
                                <div class="alert alert-info">
                                    <h3>🔄 Revisão Necessária</h3>
                                    <p>Você precisa fazer a <strong>REVISÃO ${ciclo}</strong> antes de avançar.</p>
                                    <p style="margin-top: 10px">Após a revisão, você poderá fazer questões para a próxima validação.</p>
                                </div>
                                <div style="margin-top: 20px; display: flex; gap: 10px">
                                    <button onclick="UI.closeModal(); SessaoGuiada.iniciar('${topico.id}', 'revisao')" class="btn btn-primary" style="flex: 1">
                                        Fazer Revisão Agora
                                    </button>
                                    <button onclick="UI.closeModal()" class="btn btn-secondary">Cancelar</button>
                                </div>
                            </div>
                        `);
                        return false;
                    }
                }

                return true; // Permitido
            }

            static startSessionFromId(id, tipo) {
                const topico = DataManager.getTopico(id);

                // 🆕 Validar fluxo antes de iniciar
                if (!this.validarInicioSessao(topico, tipo)) {
                    return; // Bloqueado
                }

                // 🆕 TELA PRÉ-VOO PARA REVISÃO
                if (tipo === 'revisao') {
                    this.mostrarPreVooRevisao(topico);
                } else {
                    this.startSession(topico, tipo);
                }
            }

            static startSession(topico, tipo) {
                this.tempoExtraAdicionado = 0; // 🆕 Fix: Reset extra time
                this.isPaused = false;         // 🆕 Fix: Reset pause state
                this.totalPausedTime = 0;      // 🆕 Fix: Reset paused time
                this.pauseStartTime = null;

                this.current = {
                    id: Utils.generateId(),
                    topicoId: topico.id,
                    topico,
                    tipo,
                    startTime: Date.now(),
                    duracaoMinutos: 0
                };
                Gamification.updateStreak();
                App.renderView(this.renderInterface());

                // 🆕 ALERTA DE RETOMADA (Check-in de Progresso)
                if (topico.paginaAtual && topico.paginaAtual > 0 && tipo === 'estudo') {
                    UI.showModal(`
                        <div class="modal-content">
                            <div class="alert alert-info" style="margin-bottom: 20px">
                                <h3>⚠️ Continuando Estudos</h3>
                                <p style="font-size: 1.1rem">Você parou na <strong>Página ${topico.paginaAtual}</strong> ${topico.totalPaginas > 0 ? `de ${topico.totalPaginas}` : ''}.</p>
                            </div>
                            
                            <div class="card" style="border-left: 4px solid var(--warning); margin-bottom: 20px">
                                <h4>💡 Sugestão de Aquecimento</h4>
                                <p>Antes de avançar para conteúdo novo, que tal:</p>
                                <ul>
                                    <li>Ler seus grifos das últimas 5 páginas (5-10 min)</li>
                                    <li>Fazer 5 questões sobre o que já leu</li>
                                </ul>
                            </div>

                            <button onclick="UI.closeModal(); SessaoGuiada.startTimer()" class="btn btn-primary btn-lg" style="width: 100%">
                                Entendido, Vamos lá! 🚀
                            </button>
                        </div>
                    `);
                } else if (tipo === 'blitz') {
                    // 🆕 BLITZ MODE: Fluxo dedicado
                    // Força duração mínima (5 min de leitura)
                    this.current.blitzStage = 1; // 1=Leitura/Input, 2=Questões Extras, 3=Log
                    this.startTimer();
                } else {
                    this.startTimer();
                }
            }

            static mostrarPreVooRevisao(topico) {
                const bizus = DataManager.getBizus().filter(b => b.topicoId === topico.id);
                const erros = DataManager.getErros().filter(e => e.topicoId === topico.id);
                if (bizus.length === 0 && erros.length === 0) {
                    this.startSession(topico, 'revisao');
                } else {
                    this.showRecallScreen(topico, bizus, erros, 'revisao');
                }
            }

            static adicionarTempoDurante(minutos) {
                this.tempoExtraAdicionado = (this.tempoExtraAdicionado || 0) + minutos;
                UI.showToast(`+${minutos} minutos adicionados à sessão.`);
            }

            static iniciarRevisaoDePreVoo(topicoId) {
                const t = DataManager.getTopico(topicoId);
                if (t) this.mostrarPreVooRevisao(t);
            }

            static togglePause() {
                if (!this.current) return;

                this.isPaused = !this.isPaused;
                const btnPause = document.getElementById('btnPause');
                const timerElement = document.getElementById('sessionTimer');

                if (this.isPaused) {
                    this.pauseStartTime = Date.now();
                    if (btnPause) {
                        btnPause.innerHTML = '▶ Retomar';
                        btnPause.classList.remove('btn-outline');
                        btnPause.classList.add('btn-primary');
                    }
                    if (timerElement) timerElement.style.opacity = '0.5';
                    document.title = '⏸ PAUSADO';
                    clearInterval(this.timerInterval);
                } else {
                    // Resume
                    const pausedDuration = Date.now() - this.pauseStartTime;
                    this.totalPausedTime = (this.totalPausedTime || 0) + pausedDuration;
                    this.pauseStartTime = null;

                    if (btnPause) {
                        btnPause.innerHTML = '⏸ Pausar';
                        btnPause.classList.remove('btn-primary');
                        btnPause.classList.add('btn-outline');
                    }
                    if (timerElement) timerElement.style.opacity = '1';
                    this.startTimer();
                }
            }

            static startTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
                const timerElement = document.getElementById('sessionTimer');

                this.timerInterval = setInterval(() => {
                    if (!this.current) return;
                    // Note: isPaused check not strictly needed if we clear interval, but good for safety
                    if (this.isPaused) return;

                    const now = Date.now();
                    // 🆕 Fix: Subtract paused time
                    const diff = now - this.current.startTime - (this.totalPausedTime || 0);
                    const minutes = Math.floor(diff / 60000) + (this.tempoExtraAdicionado || 0);
                    const seconds = Math.floor((diff % 60000) / 1000);

                    if (timerElement) {
                        timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    }
                    document.title = `▶ ${minutes}m - ${this.current.topico.nome}`;
                }, 1000);
            }

            static renderInterface() {
                const t = this.current.topico;
                const isBlitz = this.current.tipo === 'blitz';

                if (isBlitz) return this.renderBlitzInterface(t);

                // 🆕 CONTEXTO DETALHADO
                let contextLabel = this.current.tipo.toUpperCase();
                if (this.current.tipo === 'questoes' && (t.cicloAtual || 1) === 1) {
                    contextLabel = 'PRÁTICA (FIXAÇÃO)';
                }

                return `
                    <div style="max-width: 800px; margin: 0 auto; text-align: center; padding: 20px">
                        <div class="card" style="padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1)">
                            <div style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 10px">
                                ${contextLabel}
                            </div>
                            <h2 style="margin-bottom: 30px; font-size: 2rem">${t.nome}</h2>
                            
                            <div id="sessionTimer" style="font-size: 5rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--primary); margin-bottom: 30px">00:00</div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px">
                                <button onclick="SessaoGuiada.adicionarTempoDurante(5)" class="btn btn-outline">+ 5 Minutos</button>
                                <button onclick="SessaoGuiada.adicionarTempoDurante(15)" class="btn btn-outline">+ 15 Minutos</button>
                            </div>

                            <textarea id="sessaoNotas" class="form-control" placeholder="Anotações rápidas da sessão..." style="height: 120px; margin-bottom: 30px; font-size: 1rem"></textarea>

                            <div style="display: flex; gap: 15px">
                                <button id="btnPause" onclick="SessaoGuiada.togglePause()" class="btn btn-outline btn-lg" style="flex: 1">⏸ Pausar</button>
                                <button onclick="SessaoGuiada.finalizar()" class="btn btn-primary btn-lg" style="flex: 2; font-size: 1.2rem">⏹ Finalizar Sessão</button>
                                <button onclick="SessaoGuiada.cancelar()" class="btn btn-danger btn-lg" style="flex: 1">Descartar</button>
                            </div>
                        </div>

                        <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center">
                            <button onclick="SessaoGuiada.quickBizuForm()" class="btn btn-sm btn-secondary">💡 Criar Bizu Rápido</button>
                            <button onclick="SessaoGuiada.quickErrorForm()" class="btn btn-sm btn-danger">🔥 Registrar Erro</button>
                        </div>
                    </div>
                `;
            }

            // 🆕 INTERFACE DEDICADA: MODO BLITZ
            static renderBlitzInterface(topico) {
                const stage = this.current.blitzStage || 1;
                const bizus = DataManager.getBizus().filter(b => b.topicoId === topico.id);

                let contentHtml = '';

                // ESTÁGIO 1: REFRESH (Visualizar Bizus)
                if (stage === 1) {
                    contentHtml = `
                        <div class="alert alert-info" style="margin-bottom:20px">
                            <h4>⚡ Fase 1: Refresh Rápido (5-10 min)</h4>
                            <p>Releia seus bizus e anotações agora. Reative sua memória de curto prazo.</p>
                        </div>
                        
                        <div style="text-align:left; max-height:400px; overflow-y:auto; margin-bottom:20px; border:1px solid var(--border); padding:10px; border-radius:4px">
                            ${bizus.length ? bizus.map(b => `
                                <div style="margin-bottom:15px; padding-bottom:10px; border-bottom:1px dashed #eee">
                                    <strong>${b.titulo || 'Dica'}:</strong> ${b.conteudo || b.texto}
                                </div>
                            `).join('') : '<p class="text-muted">Nenhum bizu cadastrado. Use este tempo para ler seu resumo ou mapa mental externo.</p>'}
                        </div>

                        <button onclick="SessaoGuiada.avancarEstagioBlitz(2)" class="btn btn-primary btn-lg" style="width:100%">
                            Já lembrei! Ir para Missão Prática ➡️
                        </button>
                    `;
                }

                // ESTÁGIO 2: MISSÃO PRÁTICA (Questões Externas)
                else if (stage === 2) {
                    contentHtml = `
                        <div class="card" style="border-left: 5px solid var(--warning); padding: 20px; background: var(--bg-light)">
                            <h3 style="color: var(--warning)">🎯 SUA MISSÃO AGORA</h3>
                            <p style="font-size: 1.2rem; margin: 20px 0">
                                Vá ao seu banco de questões (QConcursos/Tec) e resolva<br>
                                <strong style="font-size:1.5rem">10 QUESTÕES</strong><br>
                                sobre <u>${topico.nome}</u>.
                            </p>
                            <ul style="text-align:left; margin-bottom:20px; color:var(--text-muted)">
                                <li>Filtre por dificuldade: Normal/Difícil</li>
                                <li>Concentre-se em acertar</li>
                                <li>Não vale consultar!</li>
                            </ul>
                        </div>
                        <button onclick="SessaoGuiada.avancarEstagioBlitz(3)" class="btn btn-success btn-lg" style="width:100%; margin-top:20px">
                            Concluí a Missão! Registrar Nota 📝
                        </button>
                    `;
                }

                // ESTÁGIO 3: LOG (Resultado)
                else if (stage === 3) {
                    contentHtml = `
                        <h3>📝 Veredito da Blitz</h3>
                        <p>Quantas questões você fez?</p>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px">
                            <div>
                                <label>Total</label>
                                <input type="number" id="blitzTotal" value="10" class="form-control" style="font-size:1.5rem; text-align:center">
                            </div>
                            <div>
                                <label>Acertos</label>
                                <input type="number" id="blitzCertas" class="form-control" style="font-size:1.5rem; text-align:center" autofocus>
                            </div>
                        </div>
                        <button onclick="SessaoGuiada.finalizarBlitz()" class="btn btn-primary btn-lg" style="width:100%">
                            Finalizar Blitz 🏁
                        </button>
                    `;
                }

                return `
                    <div style="max-width: 600px; margin: 0 auto; text-align: center; padding: 20px">
                        <div class="card" style="padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border-top: 5px solid #ffcc00">
                             <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                                <span class="badge" style="background:#ffcc00; color:black">⚡ MODO BLITZ</span>
                                <div id="sessionTimer" style="font-size: 2rem; font-weight: 700; color: var(--primary)">00:00</div>
                             </div>
                             
                             <h2 style="margin-bottom: 20px">${topico.nome}</h2>
                             
                             ${contentHtml}
                             
                             <div style="margin-top:20px">
                                <button onclick="SessaoGuiada.cancelar()" class="btn btn-sm btn-link" style="color:var(--text-muted)">Cancelar Blitz</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            static avancarEstagioBlitz(stage) {
                this.current.blitzStage = stage;
                App.renderView(this.renderInterface());
            }

            static finalizarBlitz() {
                const total = parseInt(document.getElementById('blitzTotal').value) || 0;
                const certas = parseInt(document.getElementById('blitzCertas').value) || 0;

                if (total <= 0) return alert('Informe o total de questões.');
                if (certas > total) return alert('Acertos não podem ser maior que total.');

                clearInterval(this.timerInterval);
                const duracao = Math.max(1, Math.floor((Date.now() - this.current.startTime) / 60000));

                // Processamento direto
                const sessaoData = {
                    tipo: 'blitz',
                    duracao: duracao,
                    finalizou: true, // Blitz é sempre finalizada se chegou aqui
                    total: total,
                    certas: certas
                };

                UI.showToast('⚡ Processando Blitz...', 'info');

                setTimeout(() => {
                    const resultado = SystemAuditor.processarFinalizacaoSessao(sessaoData, this.current.topico);

                    // Feedback visual turbinado
                    const perf = (certas / total) * 100;
                    const aprovado = perf >= 75; // Regra explicita visual

                    UI.showModal(`
                        <div class="modal-content" style="text-align:center">
                            <div style="font-size:4rem; margin-bottom:10px">${aprovado ? '🚀' : '⚠️'}</div>
                            <h2>Blitz ${aprovado ? 'Concluída com Sucesso!' : 'Finalizada'}</h2>
                            <p style="font-size:1.2rem; margin:10px 0">
                                Desempenho: <strong>${perf.toFixed(0)}%</strong>
                            </p>
                            <div class="alert ${aprovado ? 'alert-success' : 'alert-warning'}">
                                ${resultado.mensagem}
                            </div>
                            <button onclick="UI.closeModal(); App.navigate('dashboard')" class="btn btn-primary btn-lg" style="margin-top:20px">
                                Voltar ao Dashboard
                            </button>
                        </div>
                    `);

                }, 500);
            }

            static cancelar() {
                if (confirm('Tem certeza que deseja cancelar esta sessão? Nada será salvo.')) {
                    clearInterval(this.timerInterval);
                    this.current = null;
                    document.title = 'STUDEI 2.0';
                    App.navigate('dashboard');
                }
            }

            static finalizar() {
                clearInterval(this.timerInterval);
                document.title = 'STUDEI 2.0';
                // 🆕 Fix: Subtract paused time from final calculation
                const duracaoComputador = Math.max(1, Math.floor((Date.now() - this.current.startTime - (this.totalPausedTime || 0)) / 60000));
                const tempoTotal = duracaoComputador + (this.tempoExtraAdicionado || 0);

                const isQuestoes = this.current.tipo === 'questoes';
                const isEstudo = this.current.tipo === 'estudo';

                UI.showModal(`
                    <div class="modal-content">
                        <h2>⏱ Sessão Finalizada</h2>
                        <p>Duração total: <strong>${tempoTotal} min</strong></p>
                        
                        <div class="form-group">
                            <label>Ajuste de Tempo (se necessário)</label>
                            <input type="number" id="tempoExtraCustom" value="${this.tempoExtraAdicionado || 0}" placeholder="Minutos extras">
                        </div>

                        ${isQuestoes ? `
                            <div class="form-group" style="background: var(--bg-light); padding: 15px; border-radius: 8px">
                                <h4>📊 Desempenho nas Questões</h4>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
                                    <div>
                                        <label>Total Feitas</label>
                                        <input type="number" id="qTotal" class="form-control">
                                    </div>
                                    <div>
                                        <label>Acertos</label>
                                        <input type="number" id="qCertas" class="form-control">
                                    </div>
                                </div>
                            </div>
                        ` : ''}

                        ${isEstudo ? `
                            <div class="form-group">
                                <label>Material Utilizado</label>
                                <div style="display: flex; gap: 15px; margin-top: 5px">
                                    <label><input type="radio" name="sgMaterial" value="pdf" checked> PDF</label>
                                    <label><input type="radio" name="sgMaterial" value="video"> Vídeo</label>
                                    <label><input type="radio" name="sgMaterial" value="livro"> Livro</label>
                                </div>
                            </div>
                        ` : ''}

                        <div style="margin-top: 20px; display: flex; gap: 10px">
                            <button onclick="SessaoGuiada.confirmarFinalizacao()" class="btn btn-success" style="flex: 1">Confirmar Conclusão</button>
                            <button onclick="SessaoGuiada.startTimer(); UI.closeModal()" class="btn btn-secondary">Voltar (Cronômetro)</button>
                        </div>
                    </div>
                `);
            }

            static confirmarFinalizacao() {
                // Pegar tempo extra
                const customTempo = parseInt(document.getElementById('tempoExtraCustom')?.value || 0);
                const tempoExtra = customTempo > 0 ? customTempo : (this.tempoExtraAdicionado || 0);
                const duracaoComputador = Math.max(1, Math.floor((Date.now() - this.current.startTime) / 60000));
                const duracao = duracaoComputador + tempoExtra;

                // 🆕 Pegar dados de questões ANTES de fechar o modal
                const qTotal = parseInt(document.getElementById('qTotal')?.value || 0);
                const qCertas = parseInt(document.getElementById('qCertas')?.value || 0);

                UI.closeModal();

                // 🆕 PERGUNTA DE PROGRESSO (Se for sessão de Estudo/Teoria)
                if (this.current.tipo === 'estudo') {
                    UI.showModal(`
                        <div class="modal-content">
                            <h2>📚 Progresso do Tópico</h2>
                            <p>Você finalizou todo o conteúdo deste tópico?</p>
                            
                            <div style="display: flex; gap: 10px; justify-content: center; margin: 20px 0">
                                <button onclick="SessaoGuiada.processarFinalizacao(${duracao}, ${tempoExtra}, true, ${qTotal}, ${qCertas})" class="btn btn-success" style="flex: 1">
                                    Sim, Finalizei! 🏁
                                </button>
                                <button onclick="SessaoGuiada.mostrarInputPagina(${duracao}, ${tempoExtra}, ${qTotal}, ${qCertas})" class="btn btn-secondary" style="flex: 1">
                                    Não, Parei no meio 📖
                                </button>
                            </div>
                        </div>
                    `);
                } else {
                    // Se for Questões ou Revisão, segue normal, passando os dados capturados
                    this.finalizarComTempo(duracao, tempoExtra, null, 0, 0, qTotal, qCertas);
                }
            }

            static mostrarInputPagina(duracao, tempoExtra, qTotal = 0, qCertas = 0) {
                const t = this.current.topico;
                const totalConhecido = t.totalPaginas || '';

                UI.showModal(`
                    <div class="modal-content">
                        <h2>📖 Onde você parou?</h2>
                        
                        <div class="form-group" style="margin-top: 15px">
                            <label>Página Atual</label>
                            <input type="number" id="fpPaginaAtual" placeholder="Ex: 15" style="font-size: 1.2rem; padding: 10px">
                        </div>

                        ${!totalConhecido ? `
                            <div class="form-group">
                                <label>Total de Páginas do PDF (Opcional)</label>
                                <input type="number" id="fpTotalPaginas" placeholder="Ex: 50">
                                <small style="color: var(--text-muted)">Usado para calcular seu progresso %</small>
                            </div>
                        ` : ''}

                        <button onclick="SessaoGuiada.salvarProgressoParcial(${duracao}, ${tempoExtra}, ${qTotal}, ${qCertas})" class="btn btn-primary" style="width: 100%; margin-top: 20px">
                            Salvar Progresso
                        </button>
                    </div>
                `);
            }

            static salvarProgressoParcial(duracao, tempoExtra, qTotal = 0, qCertas = 0) {
                const pagAtual = parseInt(document.getElementById('fpPaginaAtual').value) || 0;
                const totalPag = parseInt(document.getElementById('fpTotalPaginas')?.value) || 0;

                UI.closeModal();
                this.finalizarComTempo(duracao, tempoExtra, false, pagAtual, totalPag, qTotal, qCertas);
            }

            static processarFinalizacao(duracao, tempoExtra, finalizou, qTotal = 0, qCertas = 0) {
                UI.closeModal();
                this.finalizarComTempo(duracao, tempoExtra, finalizou, 0, 0, qTotal, qCertas);
            }

            static finalizarComTempo(duracao, tempoExtra, finalizou = null, pagAtual = 0, totalPag = 0, qTotal = 0, qCertas = 0) {
                const notas = document.getElementById('sessaoNotas')?.value || '';

                // Validation
                if (this.current.tipo === 'estudo' && notas.length < 5 && !confirm('Sem notas? Deseja finalizar mesmo assim?')) return;

                let tipoMaterial = null;
                let xpMultiplier = 1;
                const topico = this.current.topico;

                // 🆕 PROCESSAMENTO DE VALIDAÇÕES
                // Agora usa os valores passados como argumento, evitando erro de modal fechado
                const sessaoData = {
                    tipo: this.current.tipo,
                    duracao: duracao,
                    finalizou: finalizou,
                    total: qTotal,
                    certas: qCertas
                };

                const resultado = SystemAuditor.processarFinalizacaoSessao(sessaoData, topico);

                // Se não permitir salvar (ex: questões insuficientes)
                if (resultado.permitirSalvar === false) {
                    UI.showToast(resultado.mensagem, 'warning');
                    return;
                }

                // Processamento específico por tipo (mantém compatibilidade)
                if (this.current.tipo === 'estudo') {
                    const matCheck = document.querySelector('input[name="sgMaterial"]:checked');
                    tipoMaterial = matCheck ? matCheck.value : 'pdf';
                    xpMultiplier = 1;

                    // Lógica de progresso de estudo
                    if (finalizou === true) {
                        topico.paginaAtual = 0; // Reseta marcador
                    } else if (finalizou === false) {
                        topico.status = 'em-andamento';
                        if (pagAtual > 0) topico.paginaAtual = pagAtual;
                        if (totalPag > 0) topico.totalPaginas = totalPag;

                        // Recalcular tamanho se tiver total
                        if (topico.totalPaginas > 0) {
                            if (topico.totalPaginas < 10) topico.tamanho = 'P';
                            else if (topico.totalPaginas <= 30) topico.tamanho = 'M';
                            else topico.tamanho = 'G';
                        }
                    }
                }

                if (this.current.tipo === 'questoes') {
                    xpMultiplier = 2;

                    // Atualizar estatísticas do tópico
                    topico.questoes = topico.questoes || { total: 0, certas: 0, erradas: 0, performance: 0 };
                    topico.questoes.total += sessaoData.total;
                    topico.questoes.certas += sessaoData.certas;
                    topico.questoes.erradas += (sessaoData.total - sessaoData.certas);
                    topico.questoes.performance = Math.round((topico.questoes.certas / topico.questoes.total) * 100);
                }

                if (this.current.tipo === 'revisao') {
                    xpMultiplier = 1.2;
                }

                DataManager.updateTopico(topico);

                // Salvar sessão
                DataManager.addSessao({
                    id: Utils.generateId(),
                    data: new Date().toISOString(),
                    topicoId: this.current.topicoId,
                    tipo: this.current.tipo,
                    duracaoMinutos: duracao,
                    notas,
                    tipoMaterial,
                    questoesRespondidas: sessaoData.total || 0,
                    questoesCertas: sessaoData.certas || 0,
                    tempoExtra: tempoExtra || 0
                });

                Gamification.addXP(duracao * xpMultiplier);
                this.current = null;
                App.navigate('dashboard');

                // 🆕 Mostrar resultado da validação
                if (resultado.dominio) {
                    UI.showToast(resultado.mensagem, 'success');
                } else if (resultado.regressao) {
                    UI.showToast(resultado.mensagem, 'warning');
                } else if (resultado.aprovado) {
                    UI.showToast(resultado.mensagem, 'success');
                } else if (resultado.mensagem) {
                    UI.showToast(resultado.mensagem, 'info');
                } else {
                    UI.showToast(`✅ Sessão finalizada! +${Math.round(duracao * xpMultiplier)} XP`, 'success');
                }
            }

            // 🆕 Métodos de Atalho para Registro Rápido
            static quickErrorForm() {
                if (!this.current) return;
                ErrorNotebook.addForm(this.current.topicoId);
            }

            static quickBizuForm() {
                if (!this.current) return;
                CadernoBizus.addForm(this.current.topicoId);
            }
        }

                const assuntos = DataManager.getAssuntosByDisciplina(d.id);

                assuntos.forEach(a => {

                        <!-- Corpo da Disciplina (Assuntos) -->
                        <div id="body-${d.id}" class="accordion-body ${isOpen ? '' : 'hidden'}" style="padding: 15px; background: var(--bg-lighter); border-top: 1px solid var(--border)">
