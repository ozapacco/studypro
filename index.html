<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDEI 2.0 - Sistema Inteligente de Estudos</title>
    <style>
        /* ===== CSS RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #f093fb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --bg: #0f172a;
            --bg-light: #1e293b;
            --bg-lighter: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #475569;
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            --space-xl: 3rem;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 1rem;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 2rem;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-light);
            border-right: 1px solid var(--border);
            padding: var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .main-content {
            flex: 1;
            padding: var(--space-xl);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-md);
        }

        .nav-item {
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--text-muted);
        }

        .nav-item:hover {
            background: var(--bg-lighter);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        .card {
            background: var(--bg-light);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-bottom: var(--space-lg);
            border: 1px solid var(--border);
        }

        .hero-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(240, 147, 251, 0.1));
            border: 2px solid var(--primary);
            padding: var(--space-xl);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-xl);
        }

        .grid {
            display: grid;
            gap: var(--space-lg);
            margin-bottom: var(--space-lg);
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .grid-4 {
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        .stat-card {
            background: var(--bg-light);
            padding: var(--space-lg);
            border-radius: var(--radius-lg);
            text-align: center;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: var(--space-sm);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: var(--space-xs);
        }

        .btn {
            padding: var(--space-sm) var(--space-lg);
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--bg-lighter);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-lg {
            padding: var(--space-md) var(--space-xl);
            font-size: 1.125rem;
        }

        .btn-sm {
            padding: var(--space-xs) var(--space-sm);
            font-size: 0.875rem;
        }

        .progress-bar {
            height: 8px;
            background: var(--bg-lighter);
            border-radius: 999px;
            overflow: hidden;
            margin: var(--space-sm) 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s;
        }

        .badge {
            display: inline-block;
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-primary {
            background: var(--primary);
            color: white;
        }

        .badge-success {
            background: var(--success);
            color: white;
        }

        .badge-warning {
            background: var(--warning);
            color: white;
        }

        .badge-danger {
            background: var(--danger);
            color: white;
        }

        .alert {
            padding: var(--space-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-md);
            display: flex;
            align-items: start;
            gap: var(--space-sm);
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border-left: 4px solid var(--warning);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--danger);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--info);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--success);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: var(--space-lg);
        }

        .modal-content {
            background: var(--bg-light);
            border-radius: var(--radius-lg);
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: var(--space-xl);
            position: relative;
        }

        .modal-xl {
            max-width: 900px;
        }

        .modal-lg {
            max-width: 800px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: var(--space-sm);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-size: 1rem;
            margin-bottom: var(--space-sm);
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .form-group {
            margin-bottom: var(--space-md);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--space-xs);
            font-weight: 500;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: var(--space-md);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: var(--space-md);
        }

        h3 {
            font-size: 1.5rem;
            margin-bottom: var(--space-sm);
        }

        h4 {
            font-size: 1.25rem;
            margin-bottom: var(--space-xs);
        }

        .hidden {
            display: none !important;
        }

        .spinner {
            border: 3px solid var(--bg-lighter);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: var(--space-xl) auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            bottom: var(--space-lg);
            right: var(--space-lg);
            background: var(--bg-light);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xl);
            z-index: 2000;
            animation: slideIn 0.3s;
            max-width: 350px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-success {
            border-left: 4px solid var(--success);
        }

        .toast-error {
            border-left: 4px solid var(--danger);
        }

        .toast-info {
            border-left: 4px solid var(--info);
        }

        .toast-warning {
            border-left: 4px solid var(--warning);
        }

        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: var(--space-md);
        }

        .achievement-item {
            text-align: center;
            opacity: 0.5;
            filter: grayscale(1);
            transition: all 0.3s;
            padding: var(--space-sm);
            background: var(--bg);
            border-radius: var(--radius-md);
        }

        .achievement-item.unlocked {
            opacity: 1;
            filter: grayscale(0);
            transform: scale(1.05);
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid var(--primary);
        }

        .achievement-icon {
            font-size: 2.5rem;
            margin-bottom: var(--space-xs);
            display: block;
        }

        .achievement-title {
            font-size: 0.75rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .hero-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-sm);
        }

        .topico-info {
            display: flex;
            gap: var(--space-md);
            color: var(--text-muted);
            margin-bottom: var(--space-md);
            font-size: 0.9rem;
        }

        .acoes-hero {
            display: flex;
            gap: var(--space-sm);
        }

        .timer-display {
            font-size: 4rem;
            font-weight: 800;
            text-align: center;
            margin: var(--space-lg) 0;
            font-variant-numeric: tabular-nums;
        }

        .timer-controles {
            display: flex;
            justify-content: center;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .btn-icon {
            background: none;
            border: 1px solid var(--border);
            padding: var(--space-sm);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text);
        }

        .btn-icon:hover {
            background: var(--bg-lighter);
            color: var(--primary);
            border-color: var(--primary);
        }

        .checklist-compreensao label {
            display: block;
            margin-bottom: var(--space-sm);
            cursor: pointer;
        }

        .checklist-compreensao input {
            width: auto;
            margin-right: var(--space-sm);
        }

        .escala-retencao {
            display: flex;
            gap: var(--space-sm);
            justify-content: space-between;
        }

        .btn-retencao {
            flex: 1;
            padding: var(--space-md) var(--space-sm);
            border-radius: var(--radius-md);
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-xs);
        }

        .btn-retencao:hover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
        }

        .estrategias-grid {
            display: grid;
            gap: var(--space-md);
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        .estrategia-card {
            padding: var(--space-lg);
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s;
        }

        .estrategia-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .estrategia-icone {
            font-size: 3rem;
            margin-bottom: var(--space-md);
        }

        .estrategia-card ul {
            margin-left: var(--space-md);
            margin-top: var(--space-sm);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Keyboard Navigation Hint */
        .keyboard-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            z-index: 1100;
            opacity: 0;
            transform: translateY(10px);
            animation: slideInHint 0.3s ease forwards, fadeOutHint 0.3s ease 2.7s forwards;
            pointer-events: none;
        }

        .keyboard-hint kbd {
            background: rgba(255, 255, 255, 0.15);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            margin: 0 4px;
        }

        @keyframes slideInHint {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOutHint {
            to {
                opacity: 0;
                transform: translateY(10px);
            }
        }

        /* Topic Selector */
        .topic-selector {
            margin-bottom: 15px;
        }

        .topic-search {
            margin-bottom: 10px;
            border: 2px solid var(--primary) !important;
            font-size: 0.95rem;
        }

        .topic-search:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2) !important;
        }

        .topic-select {
            width: 100%;
            max-height: 320px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg);
        }

        .topic-select optgroup {
            font-weight: bold;
            padding: 8px 4px 4px 4px;
            color: var(--primary);
            background: var(--bg-lighter);
        }

        .topic-select option {
            padding: 8px 12px;
            font-size: 0.9rem;
            color: var(--text);
            background: var(--bg);
        }

        .topic-select option:hover {
            background: var(--bg-lighter);
        }

        .assunto-card-expandivel {
            margin-bottom: var(--space-md);
            background: var(--bg);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .assunto-header {
            padding: var(--space-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: var(--bg-light);
        }

        .assunto-header:hover {
            background: var(--bg-lighter);
        }

        .assunto-conteudo {
            padding: var(--space-md);
            display: none;
        }

        .expandido .assunto-conteudo {
            display: block;
        }

        .icone-expandir {
            transition: transform 0.3s;
        }

        .expandido .icone-expandir {
            transform: rotate(180deg);
        }

        .topico-card-mini {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-sm);
            background: var(--bg-light);
            margin-bottom: var(--space-xs);
            border-radius: var(--radius-sm);
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .topico-card-mini:hover {
            background: var(--bg-lighter);
        }

        .topico-card-mini.nao-iniciado {
            border-left-color: var(--text-muted);
        }

        .topico-card-mini.estudando {
            border-left-color: var(--info);
        }

        .topico-card-mini.revisao {
            border-left-color: var(--warning);
        }

        .topico-card-mini.dominado {
            border-left-color: var(--success);
        }

        /* Zen Mode */
        body.zen-mode .sidebar {
            display: none;
        }

        body.zen-mode .main-content {
            margin: 0 auto;
            max-width: 900px;
            padding: var(--space-xl);
            width: 100%;
            transition: all 0.3s;
        }

        body.zen-mode .app-container {
            justify-content: center;
            background: #000;
        }

        body.zen-mode .card,
        body.zen-mode h2,
        body.zen-mode .timer-display {
            color: #eee;
        }

        body.zen-mode .card {
            background: #1a1a1a;
            border-color: #333;
        }

        /* Sistema de Marcação de Progresso */
        .topico-progresso {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .progress-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            min-width: 35px;
            text-align: center;
        }

        .progress-badge-0 {
            background: #e5e7eb;
            color: #6b7280;
        }

        .progress-badge-1 {
            background: #fef3c7;
            color: #92400e;
        }

        .progress-badge-2 {
            background: #fed7aa;
            color: #9a3412;
        }

        .progress-badge-3 {
            background: #d1fae5;
            color: #065f46;
        }

        .btn-counter {
            width: 28px;
            height: 28px;
            padding: 0;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-counter:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .btn-counter:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">🎯 STUDEI 2.0</div>
            <nav>
                <div class="nav-item" data-view="dashboard" onclick="App.navigate('dashboard')">📊 Dashboard</div>
                <div class="nav-item" data-view="cronograma" onclick="App.navigate('cronograma')">📅 Cronograma</div>
                <div class="nav-item" data-view="disciplines" onclick="App.navigate('disciplines')">📚 Disciplinas</div>
                <div class="nav-item" data-view="edital" onclick="App.navigate('edital')">📋 Gestão do Edital</div>

                <div class="nav-item" data-view="errors" onclick="App.navigate('errors')">📕 Caderno de Erros</div>
                <div class="nav-item" data-view="bizus" onclick="App.navigate('bizus')">💡 Caderno de Bizus</div>
                <div class="nav-item" data-view="simulados" onclick="App.navigate('simulados')">📝 Simulados</div>
                <div class="nav-item" data-view="analytics" onclick="App.navigate('analytics')">📈 Analytics</div>
                <div class="nav-item" data-view="achievements" onclick="App.navigate('achievements')">🏆 Conquistas
                </div>
                <div class="nav-item" data-view="methodology" onclick="App.navigate('methodology')">🧠 Metodologia</div>
                <div class="nav-item" data-view="settings" onclick="App.navigate('settings')">⚙️ Configurações</div>
                <div class="nav-item" onclick="Settings.quickSave()"
                    style="margin-top: 10px; border: 1px solid var(--border); color: var(--primary)">💾 Salvar Progresso
                </div>
            </nav>
            <div style="margin-top: auto; padding-top: var(--space-lg); border-top: 1px solid var(--border);">
                <div style="font-size: 0.875rem; color: var(--text-muted);">
                    <div>🔥 Streak: <strong id="currentStreak">0</strong> dias</div>
                    <div>⭐ Nível: <strong id="currentLevel">1</strong></div>
                    <div class="progress-bar" style="margin-top: var(--space-sm);">
                        <div class="progress-fill" id="xpProgress" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="App.toggleZenMode()" class="btn btn-sm btn-outline"
                    style="width: 100%; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 5px">
                    🧘 Zen Mode
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <div class="spinner"></div>
        </main>
    </div>

    <script>
        /* ===== SYSTEM RULES & CONSTANTS ===== */
        const SystemRules = {
            VALIDATION: {
                MIN_QUESTIONS: 10,
                DOMINIO_COUNT: 5, // 🆕 Increased from 3 to 5
                // Performance required to pass each level [Level 1, 2, 3, 4, 5]
                PERFORMANCE_TIERS: [75, 75, 75, 80, 85],
                // Days to wait before next validation [Level 1, 2, 3, 4, 5]
                MATURATION_INTERVALS: [1, 3, 7, 15, 30]
            },
            GAMIFICATION: {
                XP_PER_MIN: 1,
                XP_MULT_QUESTOES: 1.5,

        // Gerenciador de IndexedDB para File System Access API
        class IDBManager {
            static get DB_NAME() { return 'studei_db'; }
            static get STORE_NAME() { return 'handles'; }

            static async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.DB_NAME, 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.STORE_NAME)) {
                            db.createObjectStore(this.STORE_NAME);
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            static async saveHandle(handle) {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(this.STORE_NAME, 'readwrite');
                    const store = tx.objectStore(this.STORE_NAME);
                    store.put(handle, 'backup_handle');
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            }

            static async getHandle() {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(this.STORE_NAME, 'readonly');
                    const store = tx.objectStore(this.STORE_NAME);
                    const req = store.get('backup_handle');
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = (e) => reject(e.target.error);
                });
            }
        }

        class StorageManager {
            static checkPermission() {
                try {
                    localStorage.setItem('test_perm', '1');
                    localStorage.removeItem('test_perm');
                } catch (e) {
                    UI.showToast('⚠️ Erro: LocalStorage bloqueado. Seus dados não serão salvos.', 'error');
                }
            }
            static save(key, data) {
                try {
                    const wrapper = { data, timestamp: new Date().toISOString(), version: '2.0', checksum: this.calculateChecksum(data) };
                    localStorage.setItem(key, JSON.stringify(wrapper));
                    localStorage.setItem(key + '_backup', JSON.stringify(wrapper));

                    return true;
                } catch (e) { console.error(e); return false; }
            }
            static load(key, defaultValue = null) {
                try {
                    const stored = localStorage.getItem(key);
                    if (!stored) return defaultValue;
                    const parsed = JSON.parse(stored);
                    if (this.calculateChecksum(parsed.data) !== parsed.checksum) return this.loadBackup(key) || defaultValue;
                    return parsed.data || defaultValue;
                } catch (e) { return defaultValue; }
            }
            static loadBackup(key) {
                try { return JSON.parse(localStorage.getItem(key + '_backup')).data; } catch (e) { return null; }
            }
            static calculateChecksum(data) {
                const str = JSON.stringify(data);
                let hash = 0;
                for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash = hash & hash; }
                return hash.toString(36);
            }
            static exportAll() {
                const data = {};
                Object.values(STORAGE_KEYS).forEach(key => { data[key] = this.load(key); });
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `studei_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            }
            static importAll(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        Object.entries(data).forEach(([key, value]) => this.save(key, value));
                        UI.showToast('Dados importados!', 'success');
                        setTimeout(() => location.reload(), 1000);
                    } catch (e) { UI.showToast('Erro ao importar', 'error'); }
                };
                reader.readAsText(file);
            }
            static remove(key) { localStorage.removeItem(key); }
        }

        class StudeiUtils {
            static daysUntil(targetDateStr) {
                if (!targetDateStr) return 0;
                const target = new Date(targetDateStr);
                const now = new Date();
                target.setHours(0, 0, 0, 0);
                now.setHours(0, 0, 0, 0);
                const diffTime = target - now;
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            }

            static daysSince(targetDateStr) {
                if (!targetDateStr) return 0;
                const target = new Date(targetDateStr);
                const now = new Date();
                target.setHours(0, 0, 0, 0);
                now.setHours(0, 0, 0, 0);
                const diffTime = now - target;
                return Math.floor(diffTime / (1000 * 60 * 60 * 24));
            }
        }

        // ===== DATE UTILITIES (Local Time) =====
        class DateUtils {
            // Retorna data/hora atual como timestamp (recomendado para cálculos)
            static now() {
                return Date.now();
            }

            // Retorna data atual no formato YYYY-MM-DD (Local Time)
            static todayLocal() {
                const d = new Date();
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            // Retorna timestamp como string YYYY-MM-DD HH:MM:SS (Local Time)
            static timestampToLocal(timestamp) {
                const d = new Date(timestamp);
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const hours = String(d.getHours()).padStart(2, '0');
                const minutes = String(d.getMinutes()).padStart(2, '0');
                const seconds = String(d.getSeconds()).padStart(2, '0');
                return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            }

            // Converte string YYYY-MM-DD para timestamp (início do dia, Local Time)
            static dateStringToTimestamp(dateStr) {
                const [year, month, day] = dateStr.split('-').map(Number);
                return new Date(year, month - 1, day).getTime();
            }
        }

        // ===== NAVEGAÇÃO POR TECLADO =====
        class KeyboardNavigation {
            static init() {
                document.addEventListener('keydown', (e) => {
                    // Ctrl + Shift + S: Quick Save
                    if (e.ctrlKey && e.shiftKey && (e.key === 'S' || e.key === 's')) {
                        e.preventDefault();
                        Settings.quickSave();
                        return;
                    }

                    // ESC: Fechar modals
                    if (e.key === 'Escape') {
                        const modal = document.querySelector('.modal-overlay');
                        if (modal) {
                            UI.closeModal();
                            e.preventDefault();
                        }
                    }

                    // ENTER: Confirmar ações
                    if (e.key === 'Enter' && !e.shiftKey) {
                        const modal = document.querySelector('.modal-overlay');

                        // Se estiver em um modal
                        if (modal) {
                            // Se estiver em textarea, permite quebra de linha (não faz nada)
                            if (e.target.tagName === 'TEXTAREA') return;

                            // Procura botão primário no modal
                            const primaryBtn = modal.querySelector('.btn-primary');
                            if (primaryBtn && e.target.tagName !== 'BUTTON') {
                                primaryBtn.click();
                                e.preventDefault();
                            }
                        }
                        // Se estiver em um input normal (não em modal)
                        else if (e.target.tagName === 'INPUT' && e.target.type !== 'textarea') {
                            // Procura botão primário mais próximo
                            const form = e.target.closest('form') || e.target.closest('.card') || e.target.closest('div');
                            if (form) {
                                const primaryBtn = form.querySelector('.btn-primary');
                                if (primaryBtn) {
                                    primaryBtn.click();
                                    e.preventDefault();
                                }
                            }
                        }
                    }

                    // TAB: Melhorar navegação entre elementos focáveis
                    if (e.key === 'Tab') {
                        const modal = document.querySelector('.modal-overlay');
                        if (modal) {
                            const focusableElements = modal.querySelectorAll(
                                'input:not([disabled]), select:not([disabled]), textarea:not([disabled]), button:not([disabled]), [tabindex]:not([tabindex="-1"])'
                            );

                            if (focusableElements.length > 0) {
                                const firstElement = focusableElements[0];
                                const lastElement = focusableElements[focusableElements.length - 1];

                                // Se Tab no último elemento, volta pro primeiro
                                if (!e.shiftKey && document.activeElement === lastElement) {
                                    firstElement.focus();
                                    e.preventDefault();
                                }
                                // Se Shift+Tab no primeiro elemento, vai pro último
                                else if (e.shiftKey && document.activeElement === firstElement) {
                                    lastElement.focus();
                                    e.preventDefault();
                                }
                            }
                        }
                    }
                });
            }
        }

        // ===== FILE SYSTEM MANAGER (File System Access API) =====
        class FileSystemManager {
            static directoryHandle = null;
            static isSupported = 'showDirectoryPicker' in window;
            static useFallback = false; // Se true, usa localStorage como fallback

            // Solicita permissão para uma pasta do usuário
            static async requestDirectory() {
                if (!this.isSupported) {
                    UI.showToast('Navegador não suporta File System Access API. Usando localStorage.', 'warning');
                    this.useFallback = true;
                    return false;
                }

                try {
                    this.directoryHandle = await window.showDirectoryPicker({
                        mode: 'readwrite',
                        startIn: 'documents'
                    });

                    // Salvar referência no localStorage para reutilizar
                    localStorage.setItem('hasDirectoryAccess', 'true');
                    UI.showToast('📁 Pasta de dados configurada!', 'success');
                    return true;
                } catch (err) {
                    if (err.name === 'AbortError') {
                        UI.showToast('Seleção de pasta cancelada', 'info');
                    } else {
                        console.error('Erro ao solicitar diretório:', err);
                        UI.showToast('Erro ao configurar pasta. Usando localStorage.', 'error');
                        this.useFallback = true;
                    }
                    return false;
                }
            }

            // Garante que um diretório existe, criando se necessário
            static async ensureDirectory(path) {
                if (this.useFallback || !this.directoryHandle) return null;

                try {
                    const parts = path.split('/').filter(p => p);
                    let currentHandle = this.directoryHandle;

                    for (const part of parts) {
                        currentHandle = await currentHandle.getDirectoryHandle(part, { create: true });
                    }

                    return currentHandle;
                } catch (err) {
                    console.error('Erro ao criar diretório:', path, err);
                    return null;
                }
            }

            // Escreve dados JSON em um arquivo
            static async writeJSON(path, data) {
                if (this.useFallback || !this.directoryHandle) {
                    // Fallback: salvar no localStorage
                    try {
                        const key = `fs_${path.replace(/\//g, '_')}`;
                        localStorage.setItem(key, JSON.stringify(data));
                        return true;
                    } catch (err) {
                        console.error('Erro ao salvar no localStorage:', err);
                        return false;
                    }
                }

                try {
                    const parts = path.split('/');
                    const fileName = parts.pop();
                    const dirPath = parts.join('/');

                    // Navegar/criar diretórios
                    let dirHandle = this.directoryHandle;
                    if (dirPath) {
                        dirHandle = await this.ensureDirectory(dirPath);
                        if (!dirHandle) return false;
                    }

                    // Criar/sobrescrever arquivo
                    const fileHandle = await dirHandle.getFileHandle(fileName, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(JSON.stringify(data, null, 2));
                    await writable.close();

                    return true;
                } catch (err) {
                    console.error('Erro ao escrever JSON:', path, err);
                    return false;
                }
            }

            // Lê dados JSON de um arquivo
            static async readJSON(path, defaultValue = null) {
                if (this.useFallback || !this.directoryHandle) {
                    // Fallback: ler do localStorage
                    try {
                        const key = `fs_${path.replace(/\//g, '_')}`;
                        const data = localStorage.getItem(key);
                        return data ? JSON.parse(data) : defaultValue;
                    } catch (err) {
                        console.error('Erro ao ler do localStorage:', err);
                        return defaultValue;
                    }
                }

                try {
                    const parts = path.split('/');
                    const fileName = parts.pop();
                    const dirPath = parts.join('/');

                    // Navegar diretórios
                    let dirHandle = this.directoryHandle;
                    if (dirPath) {
                        const dirParts = dirPath.split('/').filter(p => p);
                        for (const part of dirParts) {
                            dirHandle = await dirHandle.getDirectoryHandle(part);
                        }
                    }

                    const fileHandle = await dirHandle.getFileHandle(fileName);
                    const file = await fileHandle.getFile();
                    const text = await file.text();
                    return JSON.parse(text);
                } catch (err) {
                    if (err.name !== 'NotFoundError') {
                        console.error('Erro ao ler JSON:', path, err);
                    }
                    return defaultValue;
                }
            }

            // Remove um arquivo
            static async deleteFile(path) {
                if (this.useFallback || !this.directoryHandle) {
                    const key = `fs_${path.replace(/\//g, '_')}`;
                    localStorage.removeItem(key);
                    return true;
                }

                try {
                    const parts = path.split('/');
                    const fileName = parts.pop();
                    const dirPath = parts.join('/');

                    let dirHandle = this.directoryHandle;
                    if (dirPath) {
                        const dirParts = dirPath.split('/').filter(p => p);
                        for (const part of dirParts) {
                            dirHandle = await dirHandle.getDirectoryHandle(part);
                        }
                    }

                    await dirHandle.removeEntry(fileName);
                    return true;
                } catch (err) {
                    console.error('Erro ao deletar arquivo:', path, err);
                    return false;
                }
            }

            // Migra dados do localStorage para JSONs
            static async migrateFromLocalStorage() {
                if (this.useFallback) {
                    UI.showToast('Migração não disponível no modo fallback', 'warning');
                    return;
                }

                if (!this.directoryHandle) {
                    await this.requestDirectory();
                    if (!this.directoryHandle) return;
                }

                UI.showToast('🔄 Iniciando migração...', 'info');

                try {
                    // Criar estrutura de diretórios
                    await this.ensureDirectory('disciplinas');
                    await this.ensureDirectory('assuntos');
                    await this.ensureDirectory('topicos');
                    await this.ensureDirectory('sessoes');

                    // Migrar disciplinas
                    const disciplinas = StorageManager.load(STORAGE_KEYS.DISCIPLINAS, []);
                    for (const disc of disciplinas) {
                        await this.writeJSON(`disciplinas/${disc.id}.json`, disc);
                    }

                    // Migrar assuntos
                    const assuntos = StorageManager.load(STORAGE_KEYS.ASSUNTOS, []);
                    for (const assunto of assuntos) {
                        await this.writeJSON(`assuntos/${assunto.id}.json`, assunto);
                    }

                    // Migrar tópicos
                    const topicos = StorageManager.load(STORAGE_KEYS.TOPICOS, []);
                    for (const topico of topicos) {
                        await this.writeJSON(`topicos/${topico.id}.json`, topico);

                        // Criar pasta do tópico
                        await this.ensureDirectory(`topicos/${topico.id}`);

                        // Inicializar arquivos vazios para anotações, bizus e erros
                        await this.writeJSON(`topicos/${topico.id}/anotacoes.json`, { topicoId: topico.id, anotacoes: [] });
                        await this.writeJSON(`topicos/${topico.id}/bizus.json`, { topicoId: topico.id, bizus: [] });
                        await this.writeJSON(`topicos/${topico.id}/erros.json`, { topicoId: topico.id, erros: [] });
                    }

                    // Migrar bizus existentes
                    const bizus = StorageManager.load(STORAGE_KEYS.BIZUS, []);
                    const bizusByTopico = {};
                    bizus.forEach(bizu => {
                        if (!bizusByTopico[bizu.topicoId]) bizusByTopico[bizu.topicoId] = [];
                        bizusByTopico[bizu.topicoId].push(bizu);
                    });
                    for (const [topicoId, topicoBizus] of Object.entries(bizusByTopico)) {
                        await this.writeJSON(`topicos/${topicoId}/bizus.json`, { topicoId, bizus: topicoBizus });
                    }

                    // Migrar erros
                    const erros = StorageManager.load(STORAGE_KEYS.ERROS, []);
                    const errosByTopico = {};
                    erros.forEach(erro => {
                        if (!errosByTopico[erro.topicoId]) errosByTopico[erro.topicoId] = [];
                        errosByTopico[erro.topicoId].push(erro);
                    });
                    for (const [topicoId, topicoErros] of Object.entries(errosByTopico)) {
                        await this.writeJSON(`topicos/${topicoId}/erros.json`, { topicoId, erros: topicoErros });
                    }

                    // Migrar sessões
                    const sessoes = StorageManager.load(STORAGE_KEYS.SESSOES, []);
                    await this.writeJSON('sessoes/sessoes.json', { sessoes });

                    // Marcar migração como concluída
                    localStorage.setItem('migrationComplete', 'true');
                    UI.showToast('✅ Migração concluída com sucesso!', 'success');
                } catch (err) {
                    console.error('Erro na migração:', err);
                    UI.showToast('❌ Erro na migração: ' + err.message, 'error');
                }
            }

            // Verifica se já tem permissão armazenada
            static hasStoredAccess() {
                return localStorage.getItem('hasDirectoryAccess') === 'true';
            }

            // Inicializa o sistema de arquivos

            // 🆕 Migração para Sistema de Validações
            static _migrarParaSistemaValidacoes() {
                const topicos = this.getTopicos();
                let migrados = 0;

                topicos.forEach(t => {
                    // Se já tem validacoes, pular
                    if (t.validacoes && t.validacoes.length > 0) return;

                    // Inicializar array de validações
                    t.validacoes = [];

                    if (t.status === 'revisao' && !t.status.includes('-')) {
                        t.cicloAtual = t.cicloAtual || 1;
                        t.status = `revisao-${t.cicloAtual}`;
                        migrados++;
                    }

                    // NOVO: Fix topics with cicloAtual > 0 stuck in "nao-iniciado"
                    if (t.status === 'nao-iniciado' && t.cicloAtual > 0) {
                        t.status = (t.cicloAtual >= 3) ? 'dominio' : `revisao-${t.cicloAtual}`;
                        migrados++;
                    }

                    // Se já está como "dominio", adicionar validações fictícias
                    if (t.status === 'dominio') {
                        // Adicionar 3 validações aprovadas (dados históricos)
                        for (let i = 1; i <= 3; i++) {
                            t.validacoes.push({
                                ciclo: i,
                                tipo: 'questoes',
                                performance: 80, // Assume 80% para dados históricos
                                questoes: 10,
                                certas: 8,
                                data: new Date().toISOString(),
                                historico: true
                            });
                        }
                        migrados++;
                    }

                    // Garantir cicloAtual
                    if (!t.cicloAtual) {
                        t.cicloAtual = 1;
                    }
                });

                if (migrados > 0) {
                    this.saveTopicos(topicos);
                    console.log(`✅ Migrados ${migrados} tópicos para sistema de validações`);
                }
            }

            static cleanupDuplicates() {
                // 1. Disciplinas
                const dis = this.getDisciplinas();
                const uniqueDis = [];
                const mapDis = {}; // nome -> id
                let removedDis = 0;

                dis.forEach(d => {
                    const key = d.nome.trim().toLowerCase();
                    if (!mapDis[key]) {
                        mapDis[key] = d.id;
                        uniqueDis.push(d);
                    } else {
                        removedDis++;
                        // Remapear assuntos desta disciplina removida para a original
                        const assuntos = this.getAssuntosByDisciplina(d.id);
                        assuntos.forEach(a => {
                            a.disciplinaId = mapDis[key];
                            this.updateAssunto(a);
                        });
                    }
                });
                if (removedDis > 0) {
                    this.saveDisciplinas(uniqueDis);
                    console.log(`Removidas ${removedDis} disciplinas duplicadas.`);
                }

                // 2. Assuntos
                const ass = this.getAssuntos();
                const uniqueAss = [];
                const mapAss = {}; // disciplinaId+nome -> id
                let removedAss = 0;

                ass.forEach(a => {
                    const key = `${a.disciplinaId}|${a.nome.trim().toLowerCase()}`;
                    if (!mapAss[key]) {
                        mapAss[key] = a.id;
                        uniqueAss.push(a);
                    } else {
                        removedAss++;
                        // Remapear tópicos
                        const tops = this.getTopicosByAssunto(a.id);
                        tops.forEach(t => {
                            t.assuntoId = mapAss[key];
                            this.updateTopico(t);
                        });
                    }
                });
                if (removedAss > 0) {
                    this.saveAssuntos(uniqueAss);
                    console.log(`Removidos ${removedAss} assuntos duplicados.`);
                }

                // 3. Tópicos
                const tops = this.getTopicos();
                const uniqueTops = [];
                const mapTops = {}; // assuntoId+nome -> id
                let removedTops = 0;

                tops.forEach(t => {
                    const key = `${t.assuntoId}|${t.nome.trim().toLowerCase()}`;
                    if (!mapTops[key]) {
                        mapTops[key] = t.id;
                        uniqueTops.push(t);
                    } else {
                        removedTops++;
                        // Tópicos duplicados: fundir progresso?
                        // Se o duplicado tem progresso e o original não, aproveitar.
                        const orig = uniqueTops.find(ut => ut.id === mapTops[key]);
                        if (orig && t.cicloAtual > (orig.cicloAtual || 0)) {
                            orig.cicloAtual = t.cicloAtual;
                            orig.status = t.status;
                            orig.proximaRevisao = t.proximaRevisao;
                        }
                    }
                });
                if (removedTops > 0) {
                    this.saveTopicos(uniqueTops);
                    console.log(`Removidos ${removedTops} tópicos duplicados.`);
                }

                // 🆕 4. Limpar órfãos (assuntos sem disciplina, tópicos sem assunto)
                const validDisciplinaIds = new Set(uniqueDis.map(d => d.id));
                const cleanedAssuntos = uniqueAss.filter(a => validDisciplinaIds.has(a.disciplinaId));
                const orphanedAssuntos = uniqueAss.length - cleanedAssuntos.length;

                const validAssuntoIds = new Set(cleanedAssuntos.map(a => a.id));
                const cleanedTopicos = uniqueTops.filter(t => validAssuntoIds.has(t.assuntoId));
                const orphanedTopicos = uniqueTops.length - cleanedTopicos.length;

                if (orphanedAssuntos > 0) {
                    this.saveAssuntos(cleanedAssuntos);
                    console.log(`🗑️ Removidos ${orphanedAssuntos} assuntos órfãos (disciplina inexistente).`);
                }

                if (orphanedTopicos > 0) {
                    this.saveTopicos(cleanedTopicos);
                    console.log(`🗑️ Removidos ${orphanedTopicos} tópicos órfãos (assunto inexistente).`);
                }

                return { removedDis, removedAss, removedTops, orphanedAssuntos, orphanedTopicos };
            }

            static marcarProgresso(topicoId, delta) {
                const topico = this.getTopico(topicoId);
                if (!topico) return;

                // Incrementar ou decrementar o contador
                topico.cicloAtual = Math.max(0, (topico.cicloAtual || 0) + delta);

                // Atualizar status baseado no número de ciclos
                if (topico.cicloAtual === 0) {
                    topico.status = 'nao-iniciado';
                } else if (topico.cicloAtual >= 3) {
                    topico.status = 'dominio';
                } else {
                    topico.status = `revisao-${topico.cicloAtual}`;
                }

                // Calcular próxima revisão se já foi estudado
                if (topico.cicloAtual > 0) {
                    const performance = topico.questoes?.performance || 75;
                    topico.proximaRevisao = MotorInteligente.calcularProximaRevisao(topico, performance);
                }

                this.updateTopico(topico);

                // Toast feedback
                const msg = topico.cicloAtual === 0
                    ? 'Tópico marcado como não iniciado'
                    : `Marcado: ${topico.cicloAtual}x estudado`;
                UI.showToast(msg, 'success');

                // 🆕 Salvar estado dos accordions antes de re-renderizar
                const accordions = document.querySelectorAll('.accordion-body');
                const expandedAssuntos = [];
                accordions.forEach((accordion, index) => {
                    if (!accordion.classList.contains('hidden')) {
                        expandedAssuntos.push(index);
                    }
                });

                // Atualizar view
                App.renderView(DisciplinesView.render());

                // 🆕 Restaurar accordions que estavam abertos
                setTimeout(() => {
                    const newAccordions = document.querySelectorAll('.accordion-body');
                    expandedAssuntos.forEach(index => {
                        if (newAccordions[index]) {
                            newAccordions[index].classList.remove('hidden');
                            const header = newAccordions[index].previousElementSibling;
                            const arrow = header?.querySelector('.arrow-small');
                            if (arrow) arrow.classList.add('rotate');
                        }
                    });
                }, 50);
            }

        class Gamification {
            static addXP(minutes) {
                const data = DataManager.getGamification();
                data.xp += minutes * SystemRules.GAMIFICATION.XP_PER_MIN;
                while (data.xp >= data.xpProximoNivel) {
                    data.xp -= data.xpProximoNivel;
                    data.nivel++;
                    data.xpProximoNivel = Math.floor(data.xpProximoNivel * SystemRules.GAMIFICATION.LEVEL_UP_FACTOR);
                    UI.showToast(`🎉 Nível ${data.nivel} alcançado!`, 'success');
                }
                DataManager.saveGamification(data);
                Achievements.check(data);
                this.updateUI();
            }
            static updateStreak() {
                const data = DataManager.getGamification();
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime(); // Midnight

                const lastDate = data.ultimoEstudo ? new Date(data.ultimoEstudo) : new Date(0);
                const last = new Date(lastDate.getFullYear(), lastDate.getMonth(), lastDate.getDate()).getTime(); // Midnight

                const diffDays = (today - last) / (1000 * 60 * 60 * 24);

                if (diffDays === 1) {
                    // Studied yesterday -> Streak ++
                    data.streak++;
                    if (data.streak > data.streakRecorde) {
                        data.streakRecorde = data.streak;
                        UI.showToast('🔥 Novo recorde de streak!', 'success');
                    } else {
                        UI.showToast('🔥 Streak mantido!', 'info');
                    }
                    data.ultimoEstudo = now.toISOString();
                    DataManager.saveGamification(data);
                    Achievements.check(data);
                } else if (diffDays > 1) {
                    // Missed a day -> Reset
                    data.streak = 1;
                    UI.showToast('😢 Streak resetado. Vamos recomeçar!', 'warning');
                    data.ultimoEstudo = now.toISOString();
                    DataManager.saveGamification(data);
                } else if (diffDays === 0) {
                    // Already studied today, just update timestamp for accuracy if needed, but don't spam toast
                    data.ultimoEstudo = now.toISOString();
                    DataManager.saveGamification(data);
                }

                this.updateUI();
            }
            static updateUI() {
                const data = DataManager.getGamification();
                document.getElementById('currentStreak').textContent = data.streak;
                document.getElementById('currentLevel').textContent = data.nivel;
                document.getElementById('xpProgress').style.width = `${(data.xp / data.xpProximoNivel) * 100}%`;
            }

            static logSystemEdit(skipCount = false) {
                if (skipCount) return; // 🆕 #10: Não contar operações em lote automatizadas

                const data = DataManager.getGamification();
                const now = new Date();
                const currentWeek = Utils.getWeekNumber(now);

                if (data.lastEditWeek !== currentWeek) {
                    data.lastEditWeek = currentWeek;
                    data.editsThisWeek = 0;
                }

                data.editsThisWeek = (data.editsThisWeek || 0) + 1;
                DataManager.saveGamification(data);

                // Anti-Fiddling Check
                // Threshold: If > 10 edits this week AND Study Time < 5 hours (300 min)
                const sessoes = DataManager.getSessoes(); // Simple check, ideally filter by week
                const totalMin = sessoes.reduce((acc, s) => acc + s.duracaoMinutos, 0);

                if (data.editsThisWeek > SystemRules.GAMIFICATION.ANTI_FIDDLE_EDITS && totalMin < SystemRules.GAMIFICATION.ANTI_FIDDLE_MIN_STUDY) {
